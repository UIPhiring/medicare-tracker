// ═══ UTILITIES ═══
const fmt=d=>{if(!d)return"—";return new Date(d+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});};
const fmtPhone=p=>{if(!p)return"—";const c=p.replace(/\D/g,"");const d=c.length>=11&&c[0]==="1"?c.slice(1):c;return d.length===10?`(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`:d.length===7?`${d.slice(0,3)}-${d.slice(3)}`:p;};
const CN={"uhc":"UnitedHealthcare","united healthcare":"UnitedHealthcare","unitedhealthcare":"UnitedHealthcare","freedom":"Freedom Health","freedom health":"Freedom Health","careplus":"CarePlus","care plus":"CarePlus","devoted":"Devoted Health","devoted health":"Devoted Health","wellcare":"WellCare","humana":"Humana","aetna":"Aetna"};
const fmtCarrier=c=>{if(!c)return"—";return CN[c.toLowerCase()]||c;};
const money=n=>"$"+(parseFloat(n)||0).toLocaleString("en-US",{minimumFractionDigits:0,maximumFractionDigits:0});
const pct=(n,d)=>d===0?"0%":(n/d*100).toFixed(1)+"%";
const appMonthKey=d=>{if(!d)return null;const dt=new Date(d+"T00:00:00");dt.setMonth(dt.getMonth()-1);return dt.toISOString().slice(0,7);};
const monthLabel=mk=>{if(!mk)return"—";return new Date(mk+"-01T00:00:00").toLocaleDateString("en-US",{month:"short",year:"2-digit"});};
const daysBetween=(a,b)=>{if(!a||!b)return null;return Math.floor((new Date(b+"T00:00:00")-new Date(a+"T00:00:00"))/86400000);};
const today=()=>new Date().toISOString().split("T")[0];
const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
const appMonthToEffMonth=m=>m===11?0:m+1;
const CC={"humana":"#22C55E","careplus":"#22C55E","unitedhealthcare":"#3B82F6","aetna":"#EC4899","devoted health":"#F97316","freedom health":"#EAB308"};
const getCC=c=>{if(!c)return"#78716C";const k=c.trim().toLowerCase();return CC[k]||CC[k.replace(/ health$/,"")]||"#78716C";};

// Commission
const calcInitialComm=(effDate,ep)=>{if(!effDate)return 0;const m=new Date(effDate+"T00:00:00").getMonth();const base=347-(29*m);return ep==="IEP"?base*2:base;};
const calcResidualMonths=(effDate,asOf)=>{if(!effDate)return 0;const y=new Date(effDate+"T00:00:00").getFullYear();const rs=new Date(y+1,0,1);const now=asOf?new Date(asOf+"T00:00:00"):new Date();if(now<rs)return 0;return(now.getFullYear()-rs.getFullYear())*12+(now.getMonth()-rs.getMonth())+1;};
const calcResidualEarned=(effDate,asOf)=>calcResidualMonths(effDate,asOf)*29;
const residualStart=effDate=>{if(!effDate)return"—";return"Jan "+(new Date(effDate+"T00:00:00").getFullYear()+1);};
const calcHeapComm=agent=>(parseFloat(agent?.heapFrontEnd)||0)+(parseFloat(agent?.heapBackEnd)||0);

const normalizeClient=c=>{
  const n={...c};
  if(n.carrier){n.carrier=n.carrier.trim();const k=n.carrier.toLowerCase();if(CN[k])n.carrier=CN[k];}
  if(!n.medicaidNumber?.trim()&&(!n.medicaidLevel||n.medicaidLevel==="None"))n.medicaidLevel="N/A";
  if(!n.planType||n.planType===""){const pn=(n.planName||"").toLowerCase();if(pn.includes("c-snp")||pn.includes("csnp"))n.planType="CSNP";else if(pn.includes("d-snp")||pn.includes("dsnp"))n.planType="DSNP";else if(pn.includes("pdp"))n.planType="PDP";else if(pn.length>0)n.planType="MAPD";}
  if(!n.hospitalIndemnity)n.hospitalIndemnity="";
  return n;
};

// ═══ UI COMPONENTS ═══
function Badge({children,color="var(--accent)"}){return<span style={{display:"inline-flex",alignItems:"center",padding:"3px 10px",borderRadius:20,fontSize:10,fontWeight:700,letterSpacing:0.6,background:`${color}14`,color,textTransform:"uppercase"}}>{children}</span>;}
function StatCard({label,value,sub,icon,color,small}){return<div style={{background:"var(--card)",borderRadius:12,padding:small?"14px 16px":"20px 24px",border:"1px solid var(--border)",flex:small?"1 1 140px":"1 1 180px",minWidth:small?130:170,boxShadow:"var(--cs)"}}><div style={{display:"flex",alignItems:"center",gap:7,marginBottom:small?8:12}}><span style={{fontSize:small?14:18}}>{icon}</span><span style={{fontSize:small?9:11,fontWeight:700,letterSpacing:0.8,textTransform:"uppercase",color:"var(--t3)"}}>{label}</span></div><div style={{fontSize:small?24:36,fontWeight:800,color:color||"var(--text)",lineHeight:1}}>{value}</div>{sub&&<div style={{fontSize:small?10:12,color:"var(--t3)",marginTop:small?3:6}}>{sub}</div>}</div>;}
function BarChart({data,color="#3B8FD9",maxBars=8}){const s=data.slice(0,maxBars);const mx=Math.max(...s.map(d=>d[1]),1);return<div style={{display:"flex",flexDirection:"column",gap:6}}>{s.map(([l,v])=><div key={l} style={{display:"flex",alignItems:"center",gap:10}}><div style={{width:95,fontSize:12,textAlign:"right",color:"var(--t2)",flexShrink:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l}</div><div style={{flex:1,background:"var(--bar-track)",borderRadius:6,height:26,overflow:"hidden"}}><div style={{height:"100%",borderRadius:6,background:color,width:`${(v/mx)*100}%`,transition:"width 0.5s",display:"flex",alignItems:"center",paddingLeft:8,fontSize:11,fontWeight:700,color:"#fff",minWidth:32}}>{typeof v==="number"&&v>999?money(v):v}</div></div></div>)}</div>;}
function MiniTable({headers,rows,emptyMsg}){return<div style={{borderRadius:8,border:"1px solid var(--border)",overflow:"hidden"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}><thead><tr style={{background:"var(--bg-hover)"}}>{headers.map(h=><th key={h} style={{padding:"8px 12px",textAlign:"left",fontWeight:700,color:"var(--t3)",fontSize:10,textTransform:"uppercase",letterSpacing:0.6,borderBottom:"1px solid var(--border)"}}>{h}</th>)}</tr></thead><tbody>{rows.length===0?<tr><td colSpan={headers.length} style={{padding:20,textAlign:"center",color:"var(--t3)"}}>{emptyMsg||"No data"}</td></tr>:rows.map((r,i)=><tr key={i} style={{background:i%2?"var(--bg-hover)":"transparent"}}>{r.map((c,j)=><td key={j} style={{padding:"8px 12px",borderBottom:"1px solid var(--border)"}}>{c}</td>)}</tr>)}</tbody></table></div>;}
function Card({title,children}){return<div style={{background:"var(--card)",borderRadius:12,border:"1px solid var(--border)",overflow:"hidden",boxShadow:"var(--cs)"}}><div style={{padding:"16px 20px",borderBottom:"1px solid var(--border)",fontWeight:700,fontSize:15}}>{title}</div><div style={{padding:20}}>{children}</div></div>;}
function Modal({children,onClose,title,subtitle,width=560}){return<div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,animation:"fadeIn 0.15s",padding:20}}><div onClick={e=>e.stopPropagation()} style={{background:"var(--card)",borderRadius:16,width:"100%",maxWidth:width,maxHeight:"90vh",overflow:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.3)",border:"1px solid var(--border)"}}>{title&&<div style={{padding:"20px 24px",borderBottom:"1px solid var(--border)"}}><div style={{fontSize:18,fontWeight:800}}>{title}</div>{subtitle&&<div style={{marginTop:4}}>{subtitle}</div>}</div>}{children}</div></div>;}

// ═══ LOGIN SCREEN ═══
function LoginScreen(){
  const[email,setEmail]=useState("");const[pw,setPw]=useState("");const[err,setErr]=useState("");const[loading,setLoading]=useState(false);const[mode,setMode]=useState("login");
  const doLogin=async()=>{setErr("");setLoading(true);try{await auth.signInWithEmailAndPassword(email,pw);}catch(e){setErr(e.code==="auth/invalid-credential"?"Invalid email or password":e.message);}setLoading(false);};
  const doSetup=async()=>{setErr("");setLoading(true);try{const cred=await auth.createUserWithEmailAndPassword(email,pw);await db.collection("users").doc(cred.user.uid).set({email,displayName:"Admin",role:"admin",createdAt:firebase.firestore.FieldValue.serverTimestamp()});}catch(e){setErr(e.message);}setLoading(false);};
  const inp2={width:"100%",padding:"12px 16px",borderRadius:10,border:"1px solid #E2E8F0",fontSize:14,fontFamily:"var(--font)",background:"#fff",color:"#0F172A",outline:"none"};
  return<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#EFF6FF 0%,#F5F7FA 50%,#EFF6FF 100%)",padding:20}}>
    <div style={{background:"#fff",borderRadius:20,padding:40,maxWidth:420,width:"100%",boxShadow:"0 8px 32px rgba(0,0,0,0.08)",border:"1px solid #E2E8F0"}}>
      <div style={{textAlign:"center",marginBottom:32}}>
        <div style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:56,height:56,borderRadius:16,background:"#3B8FD9",marginBottom:16}}><span style={{fontSize:24,color:"#fff",fontWeight:900}}>U</span></div>
        <div style={{fontSize:22,fontWeight:900,color:"#0F172A"}}>United Insurance</div>
        <div style={{fontSize:11,fontWeight:800,letterSpacing:2,color:"#3B8FD9",textTransform:"uppercase"}}>PROFESSIONALS</div>
        <div style={{fontSize:14,color:"#64748B",marginTop:8}}>{mode==="setup"?"Create Admin Account":"Sign in to your tracker"}</div>

      {err&&<div style={{padding:"10px 14px",background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:10,color:"#DC2626",fontSize:13,marginBottom:16}}>{err}</div>}
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="Email" style={inp2} onKeyDown={e=>e.key==="Enter"&&(mode==="setup"?doSetup():doLogin())} />

        <button onClick={mode==="setup"?doSetup:doLogin} disabled={loading||!email||!pw} style={{padding:"12px 20px",borderRadius:10,border:"none",background:loading?"#94A3B8":"#3B8FD9",color:"#fff",fontSize:15,fontWeight:700,cursor:loading?"wait":"pointer",fontFamily:"var(--font)",opacity:!email||!pw?0.5:1}}>{loading?"...":(mode==="setup"?"Create Admin Account":"Sign In")}</button>
      </div>
      <div style={{textAlign:"center",marginTop:16}}>
        {mode==="login"?<button onClick={()=>setMode("setup")} style={{background:"none",border:"none",color:"#3B8FD9",cursor:"pointer",fontSize:13,fontFamily:"var(--font)"}}>First time? Set up admin account</button>
        :<button onClick={()=>setMode("login")} style={{background:"none",border:"none",color:"#3B8FD9",cursor:"pointer",fontSize:13,fontFamily:"var(--font)"}}>Back to sign in</button>}

// ═══ MAIN TRACKER ═══
function MedicareTracker({currentUser,userProfile}){
  const isAdmin=userProfile?.role==="admin";
  const[dark,setDark]=useState(false);
  const[tab,setTab]=useState("dashboard");
  const[clients,setClients]=useState([]);
  const[teamUsers,setTeamUsers]=useState([]);
  const[loading,setLoading]=useState(true);
  const[toast,setToast]=useState(null);
  const[form,setForm]=useState({});
  const[showAddModal,setShowAddModal]=useState(false);
  const[editId,setEditId]=useState(null);
  const[viewClient,setViewClient]=useState(null);
  const[searchTerm,setSearchTerm]=useState("");
  const[statusFilter,setStatusFilter]=useState("all");
  const[carrierColors,setCarrierColors]=useState(false);
  const[appMonthFilter,setAppMonthFilter]=useState("all");
  const[quickEdit,setQuickEdit]=useState(null);
  const[filters,setFilters]=useState({});
  const[sortField,setSortField]=useState("custom");
  const[sortDir,setSortDir]=useState("asc");
  const[statusForm,setStatusForm]=useState({});
  const[showStatusModal,setShowStatusModal]=useState(null);
  const[confirmAction,setConfirmAction]=useState(null);
  const[showMassUpdate,setShowMassUpdate]=useState(false);
  const[massField,setMassField]=useState("");
  const[massValue,setMassValue]=useState("");
  const[showCreateUser,setShowCreateUser]=useState(false);
  const[newUser,setNewUser]=useState({email:"",password:"",displayName:"",role:"broker",heapFrontEnd:"",heapBackEnd:""});
  const[createUserError,setCreateUserError]=useState("");
  const[selectedAgent,setSelectedAgent]=useState("all");
  const[editingAgent,setEditingAgent]=useState(null);
  const[showBulkModal,setShowBulkModal]=useState(false);
  const[bulkRaw,setBulkRaw]=useState("");
  const[bulkStep,setBulkStep]=useState(1);
  const[bulkHeaders,setBulkHeaders]=useState([]);
  const[bulkRows,setBulkRows]=useState([]);
  const[bulkMapping,setBulkMapping]=useState({});

  const showToast=(msg,type="success")=>{setToast({msg,type});setTimeout(()=>setToast(null),3000);};

  // ── Load Clients ──
  useEffect(()=>{
    let unsub;
    if(isAdmin){unsub=db.collection("clients").orderBy("createdAt","desc").onSnapshot(snap=>{setClients(snap.docs.map(d=>({id:d.id,...d.data()})));setLoading(false);},()=>setLoading(false));}
    else{unsub=db.collection("clients").where("agentId","==",currentUser.uid).onSnapshot(snap=>{setClients(snap.docs.map(d=>({id:d.id,...d.data()})));setLoading(false);},()=>setLoading(false));}
    return()=>unsub&&unsub();
  },[currentUser.uid,isAdmin]);

  // ── Load Team ──
  useEffect(()=>{
    if(!isAdmin)return;
    const unsub=db.collection("users").onSnapshot(snap=>setTeamUsers(snap.docs.map(d=>({uid:d.id,...d.data()}))));
    return()=>unsub();
  },[isAdmin]);

  // ── Migrate localStorage (one-time for admin) ──
  useEffect(()=>{
    if(!isAdmin)return;
    if(localStorage.getItem("uip-firebase-migrated"))return;
    const keys=["uip-medicare-clients-v5","uip-medicare-clients-v4","uip-medicare-clients-v3"];
    for(const key of keys){
      const raw=localStorage.getItem(key);
      if(raw){try{
        const old=JSON.parse(raw);
        if(old.length>0){
          const batch=db.batch();
          old.forEach(c=>{const ref=db.collection("clients").doc();const nc=normalizeClient({...c,agentId:currentUser.uid});if(!nc.commissionAmount&&nc.effectiveDate)nc.commissionAmount=String(calcInitialComm(nc.effectiveDate,nc.electionPeriod));delete nc.id;nc.createdAt=firebase.firestore.FieldValue.serverTimestamp();batch.set(ref,nc);});
          batch.commit().then(()=>{localStorage.setItem("uip-firebase-migrated","true");showToast(`Migrated ${old.length} clients!`);});
        }
      }catch(e){console.error(e);}break;}
    }
    localStorage.setItem("uip-firebase-migrated","true");
  },[isAdmin,currentUser.uid]);

  // ── Filtered by agent ──
  const displayClients=useMemo(()=>{
    if(!isAdmin||selectedAgent==="all")return clients;
    return clients.filter(c=>c.agentId===selectedAgent);
  },[clients,isAdmin,selectedAgent]);

  // ── CRUD ──
  const saveClient=async(data)=>{
    const nc=normalizeClient({...data,agentId:data.agentId||currentUser.uid});
    if(!nc.commissionAmount&&nc.effectiveDate&&userProfile?.role!=="heap")nc.commissionAmount=String(calcInitialComm(nc.effectiveDate,nc.electionPeriod));
    if(nc.id){const id=nc.id;delete nc.id;await db.collection("clients").doc(id).update(nc);}
    else{delete nc.id;nc.createdAt=firebase.firestore.FieldValue.serverTimestamp();await db.collection("clients").add(nc);}
  };
  const deleteClient=async id=>{await db.collection("clients").doc(id).delete();setViewClient(null);showToast("Deleted");setConfirmAction(null);};
  const updateClient=async(id,u)=>await db.collection("clients").doc(id).update(u);

  // ── Form ──
  const resetForm=()=>{setForm({});setEditId(null);};
  const openEdit=c=>{setForm({...c});setEditId(c.id);setShowAddModal(true);};
  const handleSave=async()=>{
    if(!form.fullName?.trim()){showToast("Name required","error");return;}
    const cleaned={...form};
    if(cleaned.carrier){cleaned.carrier=cleaned.carrier.trim();const k=cleaned.carrier.toLowerCase();if(CN[k])cleaned.carrier=CN[k];}
    if(!cleaned.medicaidNumber?.trim())cleaned.medicaidLevel="N/A";
    cleaned.agentId=cleaned.agentId||currentUser.uid;
    if(editId)cleaned.id=editId;
    await saveClient(cleaned);
    showToast(editId?"Updated":"Added");
    setShowAddModal(false);resetForm();
  };

  // ── Status ──
  const openStatusChange=(client,ns)=>{
    const agent=teamUsers.find(u=>u.uid===client.agentId);
    const commAmt=agent?.role==="heap"?String(calcHeapComm(agent)):(client.commissionAmount||String(calcInitialComm(client.effectiveDate,client.electionPeriod)));
    setStatusForm({newStatus:ns,commissionAmount:commAmt,paidDate:client.paidDate||today(),chargebackDate:client.chargebackDate||today(),chargebackAmount:client.chargebackAmount||commAmt||"",cancelMonth:"",statusNote:""});
    setShowStatusModal(client);
  };
  const confirmStatusChange=async()=>{
    const c=showStatusModal;const ns=statusForm.newStatus;
    const u={status:ns,statusNote:statusForm.statusNote||c.statusNote||""};
    if(ns==="paid"){u.commissionAmount=statusForm.commissionAmount;u.paidDate=statusForm.paidDate||today();}
    if(ns==="inactive"){u.inactiveDate=today();u.cancelMonth=statusForm.cancelMonth||"";}
    if(ns==="chargedBack"){u.chargebackDate=statusForm.chargebackDate||today();u.chargebackAmount=statusForm.chargebackAmount;}
    if(ns==="neverInEffect"){u.inactiveDate=today();u.cancelMonth="";}
    if(ns==="active"&&(c.status==="inactive"||c.status==="chargedBack"))u.lastVerified=today();
    await updateClient(c.id,u);
    showToast(`${c.fullName} → ${ST[ns].label}`);
    setShowStatusModal(null);setViewClient(null);
  };

  const updateAgentComm=async(uid,updates)=>{await db.collection("users").doc(uid).update(updates);showToast("Updated commission");setEditingAgent(null);};

  // ── Bulk Import ──
  const parseBulkData=()=>{
    const lines=[];let inQ=false,cur="",row=[];
    for(let i=0;i<bulkRaw.length;i++){const ch=bulkRaw[i];if(ch==='"'){if(inQ&&bulkRaw[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}else if(!inQ&&ch==="\t"){row.push(cur.trim());cur="";}else if(!inQ&&(ch==="\n"||(ch==="\r"&&bulkRaw[i+1]==="\n"))){if(ch==="\r")i++;row.push(cur.trim());if(row.some(c=>c))lines.push(row);cur="";row=[];}else cur+=ch;}
    row.push(cur.trim());if(row.some(c=>c))lines.push(row);
    if(lines.length<2){showToast("Need headers + data","error");return;}
    const hdrs=lines[0];const rows=lines.slice(1);setBulkHeaders(hdrs);setBulkRows(rows);

    setBulkMapping(autoMap);setBulkStep(2);
  };
  const buildPreview=()=>bulkRows.map(row=>{const obj={};Object.entries(bulkMapping).forEach(([idx,fk])=>{if(fk&&fk!=="skip")obj[fk]=row[parseInt(idx)]||"";});return obj;});
  const execImport=async()=>{

    const batch=db.batch();
    preview.forEach(c=>{const ref=db.collection("clients").doc();const nc=normalizeClient({...c,agentId:currentUser.uid,status:"active"});if(!nc.commissionAmount&&nc.effectiveDate)nc.commissionAmount=String(calcInitialComm(nc.effectiveDate,nc.electionPeriod));nc.createdAt=firebase.firestore.FieldValue.serverTimestamp();batch.set(ref,nc);});
    await batch.commit();
    showToast(`Imported ${preview.length} clients!`);
    setShowBulkModal(false);setBulkRaw("");setBulkStep(1);setBulkHeaders([]);setBulkRows([]);setBulkMapping({});

  // ── Computed ──
  const byStatus=useMemo(()=>{const r={active:[],paid:[],inactive:[],chargedBack:[],neverInEffect:[]};displayClients.forEach(c=>{if(r[c.status])r[c.status].push(c);else r.active.push(c);});return r;},[displayClients]);
  const isPending=c=>c.effectiveDate&&new Date(c.effectiveDate+"T00:00:00")>new Date();
  const bookClients=useMemo(()=>displayClients.filter(c=>c.status==="active"||c.status==="paid"),[displayClients]);

  const getCommForClient=c=>{const agent=teamUsers.find(u=>u.uid===c.agentId);if(agent?.role==="heap")return calcHeapComm(agent);return calcInitialComm(c.effectiveDate,c.electionPeriod);};

  const applyFilters=useCallback(list=>{
    let f=[...list];
    if(searchTerm){const s=searchTerm.toLowerCase();const sd=s.replace(/\D/g,"");f=f.filter(c=>(c.fullName?.toLowerCase().includes(s))||(c.phone&&(c.phone.includes(s)||c.phone.replace(/\D/g,"").includes(sd)))||(c.email?.toLowerCase().includes(s))||(c.mailingAddress?.toLowerCase().includes(s))||(c.city?.toLowerCase().includes(s))||(c.zipCode?.includes(s))||(c.mbiNumber?.toLowerCase().includes(s))||(c.carrier?.toLowerCase().includes(s))||(c.planName?.toLowerCase().includes(s))||(c.statusNote?.toLowerCase().includes(s)));}
    if(statusFilter&&statusFilter!=="all")f=f.filter(c=>c.status===statusFilter);
    if(appMonthFilter&&appMonthFilter!=="all"){const em=appMonthToEffMonth(parseInt(appMonthFilter));f=f.filter(c=>{if(!c.effectiveDate)return false;return new Date(c.effectiveDate+"T00:00:00").getMonth()===em;});}
    Object.entries(filters).forEach(([k,v])=>{if(v&&v!=="all")f=f.filter(c=>c[k]===v);});
    if(sortField!=="custom")f.sort((a,b)=>{const av=a[sortField]||"",bv=b[sortField]||"";return sortDir==="asc"?(av<bv?-1:1):(av>bv?-1:1);});
    return f;

  const exportCSV=()=>{const af=[...FIELDS,{key:"status",label:"Status"},{key:"commissionAmount",label:"Commission"},{key:"statusNote",label:"Notes"}];const h=af.map(f=>f.label).join(",");const r=displayClients.map(c=>af.map(f=>{let v=c[f.key]||"";if(typeof v==="string"&&(v.includes(",")||v.includes('"')))v='"'+v.replace(/"/g,'""')+'"';return v;}).join(","));const bl=new Blob([h+"\n"+r.join("\n")],{type:"text/csv"});const a=document.createElement("a");a.href=URL.createObjectURL(bl);a.download="medicare-"+today()+".csv";a.click();showToast("Exported!");};

  // ── Analytics ──

    const carrierStats={};cl.forEach(c=>{if(!c.carrier)return;if(!carrierStats[c.carrier])carrierStats[c.carrier]={total:0,active:0,paid:0,inactive:0,cb:0,nie:0,projected:0};const cs=carrierStats[c.carrier];cs.total++;cs[c.status==="chargedBack"?"cb":c.status==="neverInEffect"?"nie":c.status]++;if(c.status==="active"||c.status==="paid")cs.projected+=getCommForClient(c);});

          {(()=>{const fl=applyFilters(bookClients);return fl.length===0?<div style={{background:"var(--card)",borderRadius:12,padding:50,textAlign:"center",border:"1px solid var(--border)",color:"var(--t3)"}}><div style={{fontSize:42,marginBottom:10}}>📖</div>No clients match</div>:<div style={{display:"flex",flexDirection:"column",gap:6}}><div style={{padding:"4px 18px",fontSize:12,color:"var(--t2)",fontWeight:600}}>{fl.length} shown</div>{colHdr}{fl.map(c=>renderRow(c,true))}</div>;})()}
        </div>}

        {/* ALL CLIENTS */}
        {tab==="clients"&&<div style={{animation:"slideUp 0.3s"}}>
          <div style={{marginBottom:14}}><h1 style={{fontSize:24,fontWeight:800}}>All Clients</h1><p style={{fontSize:13,color:"var(--t3)"}}>On book and off book</p></div>
          {renderFilters(displayClients)}
          <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
            <button onClick={()=>setStatusFilter("all")} style={{...btnO,fontSize:12,background:statusFilter==="all"?"var(--tab-bg)":"var(--card)",borderColor:statusFilter==="all"?"#3B8FD9":"var(--border)",color:statusFilter==="all"?"#3B8FD9":"var(--t2)"}}>All ({displayClients.length})</button>
            {Object.entries(ST).map(([k,v])=><button key={k} onClick={()=>setStatusFilter(k)} style={{...btnO,fontSize:12,background:statusFilter===k?`${v.color}10`:"var(--card)",borderColor:statusFilter===k?v.color:"var(--border)",color:statusFilter===k?v.color:"var(--t2)"}}>{v.icon} {v.label} ({byStatus[k]?.length||0})</button>)}
          </div>
          {(()=>{const fl=applyFilters(displayClients);return fl.length===0?<div style={{background:"var(--card)",borderRadius:12,padding:50,textAlign:"center",border:"1px solid var(--border)",color:"var(--t3)"}}><div style={{fontSize:42,marginBottom:10}}>👥</div>No clients</div>:<div style={{display:"flex",flexDirection:"column",gap:6}}><div style={{padding:"4px 18px",fontSize:12,color:"var(--t2)",fontWeight:600}}>{fl.length} shown</div>{colHdr}{fl.map(c=>renderRow(c,true))}</div>;})()}
        </div>}

        {/* ANALYTICS */}
        {tab==="analytics"&&<div style={{animation:"slideUp 0.3s"}}>
          <div style={{marginBottom:24}}><h1 style={{fontSize:24,fontWeight:800}}>Analytics & Tracking</h1>{isAdmin&&<select value={selectedAgent} onChange={e=>setSelectedAgent(e.target.value)} style={{...inp,width:"auto",minWidth:150,marginTop:8,cursor:"pointer"}}><option value="all">All Agents</option>{teamUsers.map(u=><option key={u.uid} value={u.uid}>{u.displayName}</option>)}</select>}</div>
          <div style={{display:"flex",gap:14,flexWrap:"wrap",marginBottom:20}}>
            <StatCard icon="💵" value={money(analytics.projectedInitial)} label="Projected Initial" color="#22C55E" sub={analytics.inForce+" in-force"} small />
            <StatCard icon="🔁" value={money(analytics.monthlyResidual)+"/mo"} label="Monthly Residual" color="#8B5CF6" sub={"$29 × "+analytics.inForce} small />
            <StatCard icon="📊" value={money(analytics.annualResidualProjected)} label="Annual Residual" color="#3B8FD9" small />
            <StatCard icon="📉" value={money(analytics.totalCB)} label="Chargebacks" color="#EF4444" small />
            <StatCard icon="📈" value={analytics.t>0?pct(analytics.inForce,analytics.t):"0%"} label="Retention" small />
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(380px,1fr))",gap:18,marginBottom:18}}>
            <Card title="💵 Commission by App Month">{Object.keys(analytics.commByAppMonth).length===0?<div style={{color:"var(--t3)",textAlign:"center",padding:20}}>No data</div>:<BarChart data={Object.entries(analytics.commByAppMonth).sort((a,b)=>a[0].localeCompare(b[0])).map(([mk,v])=>[monthLabel(mk),v])} color="#22C55E" />}</Card>
            <Card title="📅 Cohort Retention">{Object.keys(analytics.cohorts).length===0?<div style={{color:"var(--t3)",textAlign:"center",padding:20}}>No data</div>:<MiniTable headers={["App Mo","Enrolled","In Force","Dropped","Comm","Retention"]} rows={Object.entries(analytics.cohorts).sort((a,b)=>a[0].localeCompare(b[0])).map(([mk,d])=>[monthLabel(mk),<strong>{d.enrolled}</strong>,<span style={{color:"#22C55E",fontWeight:700}}>{d.inForce}</span>,<span style={{color:"#EF4444",fontWeight:700}}>{d.dropped}</span>,<strong style={{color:"#22C55E"}}>{money(d.projComm)}</strong>,<span style={{fontWeight:800,color:d.enrolled>0&&d.inForce/d.enrolled>=0.85?"#22C55E":"#EF4444"}}>{pct(d.inForce,d.enrolled)}</span>])} />}</Card>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(380px,1fr))",gap:18,marginBottom:18}}>
            <Card title="🏢 Carrier Production"><MiniTable headers={["Carrier","Total","Active","Paid","Inactive","CB","Comm"]} rows={Object.entries(analytics.carrierStats).sort((a,b)=>b[1].total-a[1].total).map(([cr,s])=>[<strong>{cr}</strong>,<strong>{s.total}</strong>,<span style={{color:"#22C55E"}}>{s.active}</span>,<span style={{color:"#3B8FD9"}}>{s.paid}</span>,<span style={{color:"#F59E0B"}}>{s.inactive}</span>,<span style={{color:"#EF4444"}}>{s.cb}</span>,<strong style={{color:"#22C55E"}}>{money(s.projected)}</strong>])} /></Card>
            <Card title="📉 Client Fall-Off">{analytics.survData.length===0?<div style={{color:"var(--t3)",textAlign:"center",padding:20}}>No dropped clients</div>:<BarChart data={analytics.survData} color="#EF4444" />}</Card>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(380px,1fr))",gap:18,marginBottom:18}}>
            <Card title="🗺️ States"><BarChart data={Object.entries(analytics.stateStats).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([s,n])=>[s,n])} color="#60A5FA" /></Card>
            <Card title="🚫 Never in Effect">{analytics.nie===0?<div style={{color:"var(--t3)",textAlign:"center",padding:20}}>None</div>:<div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:14}}><div style={{textAlign:"center",padding:12,background:"var(--bg-hover)",borderRadius:10}}><div style={{fontSize:24,fontWeight:800,color:"#94A3B8"}}>{analytics.nie}</div><div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",color:"var(--t3)",marginTop:4}}>Count</div></div><div style={{textAlign:"center",padding:12,background:"var(--bg-hover)",borderRadius:10}}><div style={{fontSize:24,fontWeight:800,color:"#EF4444"}}>{money(analytics.nieLostComm)}</div><div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",color:"var(--t3)",marginTop:4}}>Lost</div></div><div style={{textAlign:"center",padding:12,background:"var(--bg-hover)",borderRadius:10}}><div style={{fontSize:24,fontWeight:800,color:"#94A3B8"}}>{pct(analytics.nie,analytics.t)}</div><div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",color:"var(--t3)",marginTop:4}}>Rate</div></div></div><BarChart data={Object.entries(analytics.nieByCarrier).sort((a,b)=>b[1]-a[1]).map(([c2,n])=>[c2,n])} color="#94A3B8" /></div>}</Card>
          </div>
        </div>}

        {/* TEAM */}
        {tab==="team"&&isAdmin&&<div style={{animation:"slideUp 0.3s"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
            <div><h1 style={{fontSize:24,fontWeight:800}}>Team Management</h1><p style={{fontSize:13,color:"var(--t3)"}}>{teamUsers.length} members</p></div>
            <button onClick={()=>{setNewUser({email:"",password:"",displayName:"",role:"broker",heapFrontEnd:"",heapBackEnd:""});setCreateUserError("");setShowCreateUser(true);}} style={btnP}>+ Add Agent</button>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            <div style={{display:"grid",gridTemplateColumns:"1.5fr 0.8fr 0.6fr 0.6fr 0.6fr 0.8fr 1fr 0.6fr",gap:10,padding:"8px 18px",fontSize:10,fontWeight:700,color:"var(--t3)",textTransform:"uppercase",letterSpacing:0.8}}><div>Name</div><div>Role</div><div>Clients</div><div>In Force</div><div>Dropped</div><div>Commission</div><div>Pay Structure</div><div>Actions</div></div>
            {agentStats.map(u=><div key={u.uid} style={{display:"grid",gridTemplateColumns:"1.5fr 0.8fr 0.6fr 0.6fr 0.6fr 0.8fr 1fr 0.6fr",gap:10,padding:"14px 18px",borderRadius:10,background:"var(--card)",border:"1px solid var(--border)",alignItems:"center",boxShadow:"var(--cs)"}}>
              <div><div style={{fontWeight:700,fontSize:14}}>{u.displayName}</div><div style={{fontSize:11,color:"var(--t3)"}}>{u.email}</div></div>
              <Badge color={u.role==="admin"?"#3B8FD9":u.role==="heap"?"#F97316":"#22C55E"}>{u.role}</Badge>
              <div style={{fontWeight:700}}>{u.totalClients}</div>
              <div style={{fontWeight:700,color:"#22C55E"}}>{u.inForce}</div>
              <div style={{fontWeight:700,color:"#EF4444"}}>{u.dropped}</div>
              <div style={{fontWeight:700,color:"#22C55E"}}>{money(u.projComm)}</div>
              <div style={{fontSize:12}}>{u.role==="heap"?<span>FE: {money(u.heapFrontEnd||0)} / BE: {money(u.heapBackEnd||0)}</span>:u.role==="broker"?"Broker formula":"Admin"}</div>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>{setSelectedAgent(u.uid);setTab("analytics");}} style={{...btnO,fontSize:11,padding:"4px 10px"}}>📊</button>
                {u.role!=="admin"&&<button onClick={()=>setEditingAgent({...u})} style={{...btnO,fontSize:11,padding:"4px 10px"}}>✏️</button>}
              </div>
            </div>)}
          </div>
        </div>}
      </main>

      {/* ═══ MODALS ═══ */}

      {showAddModal&&<Modal onClose={()=>{setShowAddModal(false);resetForm();}} title={editId?"Edit Client":"Add New Client"}>
        <div style={{padding:24,display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,maxHeight:"60vh",overflowY:"auto"}}>
          {FIELDS.map(f=><div key={f.key} style={{gridColumn:f.key==="mailingAddress"?"1/-1":"auto"}}><label style={{display:"block",fontSize:11,fontWeight:700,color:"var(--t3)",marginBottom:4,textTransform:"uppercase",letterSpacing:0.5}}>{f.label}{f.key==="fullName"&&<span style={{color:"#EF4444"}}> *</span>}</label>
            {f.type==="select"?<select value={form[f.key]||""} onChange={e=>setForm(p=>({...p,[f.key]:e.target.value}))} style={{...inp,cursor:"pointer"}}><option value="">Select...</option>{f.options.map(o=><option key={o} value={o}>{o}</option>)}</select>
            :<input type={f.type} value={form[f.key]||""} onChange={e=>setForm(p=>({...p,[f.key]:e.target.value}))} placeholder={f.label} style={inp} />}
          </div>)}
        </div>
        <div style={{padding:"14px 24px",borderTop:"1px solid var(--border)",display:"flex",justifyContent:"flex-end",gap:10}}><button onClick={()=>{setShowAddModal(false);resetForm();}} style={btnO}>Cancel</button><button onClick={handleSave} style={btnP}>{editId?"Save":"Add Client"}</button></div>
      </Modal>}

      {viewClient&&!showStatusModal&&<Modal onClose={()=>setViewClient(null)} width={700} title={viewClient.fullName} subtitle={<Badge color={(ST[viewClient.status]||ST.active).color}>{(ST[viewClient.status]||ST.active).icon} {(ST[viewClient.status]||ST.active).label}</Badge>}>
        <div style={{padding:24,maxHeight:"50vh",overflowY:"auto"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
            {FIELDS.map(f=><div key={f.key} style={{gridColumn:f.key==="mailingAddress"?"1/-1":"auto"}}><div style={{fontSize:10,fontWeight:700,color:"var(--t3)",textTransform:"uppercase",letterSpacing:0.6,marginBottom:3}}>{f.label}</div><div style={{fontSize:14,fontWeight:500}}>{f.type==="date"?fmt(viewClient[f.key]):f.key==="phone"?fmtPhone(viewClient[f.key]):f.key==="carrier"?fmtCarrier(viewClient[f.key]):viewClient[f.key]||"—"}</div></div>)}
          </div>
          <div style={{borderTop:"1px solid var(--border)",marginTop:18,paddingTop:18}}>
            <div style={{fontSize:13,fontWeight:700,marginBottom:12}}>💰 Tracking</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:10}}>
              {[{l:"Initial Commission",v:money(getCommForClient(viewClient)),c:"#22C55E"},{l:"Residuals Started",v:residualStart(viewClient.effectiveDate),c:"#3B8FD9"},{l:"Residual Earned",v:money(calcResidualEarned(viewClient.effectiveDate,today())),c:"#8B5CF6"},{l:"Total Earned",v:money(getCommForClient(viewClient)+calcResidualEarned(viewClient.effectiveDate,today())),c:"#22C55E"},{l:"Chargeback",v:viewClient.chargebackAmount?money(viewClient.chargebackAmount):"—",c:"#EF4444"},{l:"Cancelled",v:viewClient.cancelMonth?new Date(viewClient.cancelMonth+"-01T00:00:00").toLocaleDateString("en-US",{month:"short",year:"numeric"}):"—",c:viewClient.cancelMonth?"#F59E0B":"var(--text)"},{l:"Notes",v:viewClient.statusNote||"—"}
              ].map(f=><div key={f.l} style={{padding:10,background:"var(--bg-hover)",borderRadius:8}}><div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",color:"var(--t3)",letterSpacing:0.5,marginBottom:3}}>{f.l}</div><div style={{fontSize:13,fontWeight:600,color:f.c||"var(--text)"}}>{f.v}</div></div>)}
            </div>
          </div>
          {isAdmin&&<div style={{fontSize:11,color:"var(--t3)",marginTop:12}}>Agent: {teamUsers.find(u=>u.uid===viewClient.agentId)?.displayName||"—"}</div>}
        </div>
        <div style={{padding:"14px 24px",borderTop:"1px solid var(--border)",display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
          <button onClick={()=>setConfirmAction({title:"Delete",danger:true,label:"Delete",message:`Delete ${viewClient.fullName}?`,onConfirm:()=>deleteClient(viewClient.id)})} style={{...btnO,borderColor:"#EF4444",color:"#EF4444",fontSize:12}}>🗑 Delete</button>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {(TRANSITIONS[viewClient.status]||[]).map(ns=>{const s=ST[ns];return<button key={ns} onClick={()=>openStatusChange(viewClient,ns)} style={{...btnO,borderColor:s.color,color:s.color,fontSize:12}}>{s.icon} {s.label}</button>;})}
            <button onClick={()=>{setViewClient(null);openEdit(viewClient);}} style={{...btnP,fontSize:12}}>✏️ Edit</button>
          </div>
        </div>
      </Modal>}

      {showStatusModal&&<Modal onClose={()=>setShowStatusModal(null)} width={480} title={`→ ${ST[statusForm.newStatus]?.label}`} subtitle={showStatusModal.fullName}>
        <div style={{padding:24}}>
          <div style={{display:"flex",alignItems:"center",gap:10,padding:14,background:`${ST[statusForm.newStatus]?.color}10`,borderRadius:10,border:`1px solid ${ST[statusForm.newStatus]?.color}30`,marginBottom:18}}><span style={{fontSize:22}}>{ST[statusForm.newStatus]?.icon}</span><div><div style={{fontWeight:700,fontSize:14}}>{ST[statusForm.newStatus]?.label}</div><div style={{fontSize:12,color:"var(--t2)"}}>{ST[statusForm.newStatus]?.desc}</div></div></div>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            {statusForm.newStatus==="paid"&&<><div><label style={{fontSize:11,fontWeight:700,textTransform:"uppercase",color:"var(--t3)"}}>Commission ($)</label><input type="number" step="0.01" value={statusForm.commissionAmount} onChange={e=>setStatusForm(p=>({...p,commissionAmount:e.target.value}))} style={{...inp,marginTop:4}} /></div><div><label style={{fontSize:11,fontWeight:700,textTransform:"uppercase",color:"var(--t3)"}}>Date Paid</label><input type="date" value={statusForm.paidDate} onChange={e=>setStatusForm(p=>({...p,paidDate:e.target.value}))} style={{...inp,marginTop:4}} /></div></>}
            {statusForm.newStatus==="inactive"&&<div><label style={{fontSize:11,fontWeight:700,textTransform:"uppercase",color:"var(--t3)"}}>Month they cancelled</label><input type="month" value={statusForm.cancelMonth} onChange={e=>setStatusForm(p=>({...p,cancelMonth:e.target.value}))} style={{...inp,marginTop:4}} /></div>}
            {statusForm.newStatus==="chargedBack"&&<><div><label style={{fontSize:11,fontWeight:700,textTransform:"uppercase",color:"var(--t3)"}}>Chargeback ($)</label><input type="number" step="0.01" value={statusForm.chargebackAmount} onChange={e=>setStatusForm(p=>({...p,chargebackAmount:e.target.value}))} style={{...inp,marginTop:4}} /></div><div><label style={{fontSize:11,fontWeight:700,textTransform:"uppercase",color:"var(--t3)"}}>Date</label><input type="date" value={statusForm.chargebackDate} onChange={e=>setStatusForm(p=>({...p,chargebackDate:e.target.value}))} style={{...inp,marginTop:4}} /></div></>}
            <div><label style={{fontSize:11,fontWeight:700,textTransform:"uppercase",color:"var(--t3)"}}>Notes</label><input type="text" value={statusForm.statusNote} onChange={e=>setStatusForm(p=>({...p,statusNote:e.target.value}))} placeholder="Reason..." style={{...inp,marginTop:4}} /></div>
          </div>
        </div>
        <div style={{padding:"14px 24px",borderTop:"1px solid var(--border)",display:"flex",justifyContent:"flex-end",gap:10}}><button onClick={()=>setShowStatusModal(null)} style={btnO}>Cancel</button><button onClick={confirmStatusChange} style={{...btnP,background:ST[statusForm.newStatus]?.color}}>Confirm</button></div>
      </Modal>}

      {/* Bulk Import */}
      {showBulkModal&&<Modal onClose={()=>setShowBulkModal(false)} width={860} title="📋 Mass Import" subtitle={`Step ${bulkStep} of 3`}>
        {bulkStep===1&&<div style={{padding:24}}><div style={{background:"var(--bg-hover)",borderRadius:10,padding:16,marginBottom:16,border:"1px solid var(--border)"}}><div style={{fontSize:12,fontWeight:700,marginBottom:6,color:"#3B8FD9",textTransform:"uppercase",letterSpacing:0.5}}>Instructions</div><div style={{fontSize:12,color:"var(--t2)",lineHeight:1.7}}>Select all in spreadsheet → Copy → Paste below. First row must be headers.</div></div><textarea value={bulkRaw} onChange={e=>setBulkRaw(e.target.value)} placeholder="Paste spreadsheet data..." style={{...inp,height:200,resize:"vertical",fontFamily:"monospace",fontSize:12}} /></div>}
        {bulkStep===2&&<div style={{padding:24,maxHeight:"55vh",overflowY:"auto"}}><div style={{background:"var(--bg-hover)",borderRadius:10,padding:12,marginBottom:16,border:"1px solid var(--border)",fontSize:12,color:"var(--t2)"}}>Found <strong style={{color:"#3B8FD9"}}>{bulkHeaders.length}</strong> columns, <strong style={{color:"#3B8FD9"}}>{bulkRows.length}</strong> rows</div>{bulkHeaders.map((h,idx)=>{const samples=bulkRows.slice(0,3).map(r=>r[idx]||"").filter(Boolean).join(", ");return<div key={idx} style={{display:"grid",gridTemplateColumns:"1fr 32px 1fr",gap:10,alignItems:"center",padding:"10px 14px",borderRadius:8,background:"var(--bg-hover)",border:"1px solid var(--border)",marginBottom:6}}><div><div style={{fontWeight:700,fontSize:13}}>{h}</div><div style={{fontSize:11,color:"var(--t3)",fontStyle:"italic"}}>{samples||"(empty)"}</div></div><div style={{textAlign:"center",color:bulkMapping[idx]&&bulkMapping[idx]!=="skip"?"#3B8FD9":"var(--t3)"}}>{bulkMapping[idx]&&bulkMapping[idx]!=="skip"?"→":"·"}</div><select value={bulkMapping[idx]||"skip"} onChange={e=>setBulkMapping(p=>({...p,[idx]:e.target.value}))} style={{...inp,cursor:"pointer"}}><option value="skip">— Skip —</option>{FIELDS.map(f=><option key={f.key} value={f.key}>{f.label}</option>)}</select></div>;})}</div>}
        {bulkStep===3&&(()=>{const prev=buildPreview(),valid=prev.filter(c=>c.fullName?.trim());return<div style={{padding:24}}><div style={{display:"flex",gap:12,marginBottom:16}}><div style={{padding:"8px 14px",borderRadius:8,background:"#F0FDF4",border:"1px solid #BBF7D0",fontSize:13}}><strong style={{color:"#22C55E"}}>{valid.length}</strong> ready</div></div></div>;})()}
        <div style={{padding:"14px 24px",borderTop:"1px solid var(--border)",display:"flex",justifyContent:"space-between"}}><button onClick={()=>{if(bulkStep===1)setShowBulkModal(false);else setBulkStep(s=>s-1);}} style={btnO}>{bulkStep===1?"Cancel":"← Back"}</button>{bulkStep===1&&<button onClick={parseBulkData} disabled={!bulkRaw.trim()} style={{...btnP,opacity:bulkRaw.trim()?1:0.4}}>Parse →</button>}{bulkStep===2&&<button onClick={()=>{if(!Object.values(bulkMapping).includes("fullName")){showToast("Map Full Name","error");return;}setBulkStep(3);}} style={btnP}>Preview →</button>}{bulkStep===3&&<button onClick={execImport} style={btnP}>✅ Import {buildPreview().filter(c=>c.fullName?.trim()).length}</button>}</div>
      </Modal>}

      {/* Create User */}
      {showCreateUser&&<Modal onClose={()=>setShowCreateUser(false)} width={480} title="Add Team Member">
        <div style={{padding:24,display:"flex",flexDirection:"column",gap:14}}>
          {createUserError&&<div style={{padding:"10px 14px",background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:10,color:"#DC2626",fontSize:13}}>{createUserError}</div>}
          <div><label style={{fontSize:11,fontWeight:700,textTransform:"uppercase",color:"var(--t3)"}}>Full Name</label><input value={newUser.displayName} onChange={e=>setNewUser(p=>({...p,displayName:e.target.value}))} style={{...inp,marginTop:4}} /></div>
          <div><label style={{fontSize:11,fontWeight:700,textTransform:"uppercase",color:"var(--t3)"}}>Email</label><input type="email" value={newUser.email} onChange={e=>setNewUser(p=>({...p,email:e.target.value}))} style={{...inp,marginTop:4}} /></div>
          <div><label style={{fontSize:11,fontWeight:700,textTransform:"uppercase",color:"var(--t3)"}}>Temporary Password</label><input type="text" value={newUser.password} onChange={e=>setNewUser(p=>({...p,password:e.target.value}))} placeholder="Min 6 chars" style={{...inp,marginTop:4}} /></div>
          <div><label style={{fontSize:11,fontWeight:700,textTransform:"uppercase",color:"var(--t3)"}}>Account Type</label>
            <select value={newUser.role} onChange={e=>setNewUser(p=>({...p,role:e.target.value}))} style={{...inp,marginTop:4,cursor:"pointer"}}>
              <option value="broker">Broker (standard commission)</option>
              <option value="heap">HEAP (custom commission)</option>
            </select>
          </div>
          {newUser.role==="heap"&&<>
            <div><label style={{fontSize:11,fontWeight:700,textTransform:"uppercase",color:"var(--t3)"}}>Front-End Pay ($ per sale)</label><input type="number" value={newUser.heapFrontEnd} onChange={e=>setNewUser(p=>({...p,heapFrontEnd:e.target.value}))} placeholder="0" style={{...inp,marginTop:4}} /></div>
            <div><label style={{fontSize:11,fontWeight:700,textTransform:"uppercase",color:"var(--t3)"}}>Back-End Pay ($ per sale)</label><input type="number" value={newUser.heapBackEnd} onChange={e=>setNewUser(p=>({...p,heapBackEnd:e.target.value}))} placeholder="0" style={{...inp,marginTop:4}} /></div>
          </>}
        </div>
        <div style={{padding:"14px 24px",borderTop:"1px solid var(--border)",display:"flex",justifyContent:"flex-end",gap:10}}>
          <button onClick={()=>setShowCreateUser(false)} style={btnO}>Cancel</button>
          <button onClick={handleCreateUser} disabled={!newUser.email||!newUser.password||!newUser.displayName} style={{...btnP,opacity:newUser.email&&newUser.password&&newUser.displayName?1:0.4}}>Create Account</button>
        </div>
      </Modal>}

      {/* Edit Agent */}
      {editingAgent&&<Modal onClose={()=>setEditingAgent(null)} width={420} title={`Edit ${editingAgent.displayName}`}>
        <div style={{padding:24,display:"flex",flexDirection:"column",gap:14}}>
          <div><label style={{fontSize:11,fontWeight:700,textTransform:"uppercase",color:"var(--t3)"}}>Role</label>
            <select value={editingAgent.role} onChange={e=>setEditingAgent(p=>({...p,role:e.target.value}))} style={{...inp,marginTop:4,cursor:"pointer"}}><option value="broker">Broker</option><option value="heap">HEAP</option></select>
          </div>
          {editingAgent.role==="heap"&&<>
            <div><label style={{fontSize:11,fontWeight:700,textTransform:"uppercase",color:"var(--t3)"}}>Front-End Pay ($)</label><input type="number" value={editingAgent.heapFrontEnd||""} onChange={e=>setEditingAgent(p=>({...p,heapFrontEnd:e.target.value}))} style={{...inp,marginTop:4}} /></div>
            <div><label style={{fontSize:11,fontWeight:700,textTransform:"uppercase",color:"var(--t3)"}}>Back-End Pay ($)</label><input type="number" value={editingAgent.heapBackEnd||""} onChange={e=>setEditingAgent(p=>({...p,heapBackEnd:e.target.value}))} style={{...inp,marginTop:4}} /></div>
          </>}
        </div>
        <div style={{padding:"14px 24px",borderTop:"1px solid var(--border)",display:"flex",justifyContent:"flex-end",gap:10}}>
          <button onClick={()=>setEditingAgent(null)} style={btnO}>Cancel</button>
          <button onClick={()=>updateAgentComm(editingAgent.uid,{role:editingAgent.role,heapFrontEnd:editingAgent.heapFrontEnd||"0",heapBackEnd:editingAgent.heapBackEnd||"0"})} style={btnP}>Save</button>
        </div>
      </Modal>}

    </div>
  );
}

// ═══ APP WRAPPER ═══
function App(){
  const[user,setUser]=useState(null);const[profile,setProfile]=useState(null);const[loading,setLoading]=useState(true);
  useEffect(()=>{
    const unsub=auth.onAuthStateChanged(async u=>{
      if(u){setUser(u);const doc=await db.collection("users").doc(u.uid).get();if(doc.exists)setProfile(doc.data());else{const unsub2=db.collection("users").doc(u.uid).onSnapshot(snap=>{if(snap.exists){setProfile(snap.data());unsub2();}});}}
      else{setUser(null);setProfile(null);}
      setLoading(false);
    });return()=>unsub();
  },[]);
  if(loading)return<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",fontFamily:"'Inter',sans-serif"}}><div style={{fontSize:18,fontWeight:700,color:"#64748B"}}>Loading...</div></div>;
  if(!user)return<LoginScreen />;
  if(!profile)return<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",fontFamily:"'Inter',sans-serif"}}><div style={{fontSize:14,color:"#64748B"}}>Setting up...</div></div>;
  return<MedicareTracker currentUser={user} userProfile={profile} />;
}

ReactDOM.render(<App />,document.getElementById('root'));
</script>
</body>
</html>
