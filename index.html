/* Parse Enrollment Confirmation Paste — Sunfire/Humana + UHC/EnrollHere */
const parseEnrollment=(txt0)=>{
/* Normalize text: strip carriage returns, tabs, zero-width chars */
const txt=txt0.replace(/\r/g,"").replace(/\t/g," ").replace(/[\u200B-\u200D\uFEFF]/g,"");
console.log("PARSE DEBUG - first 200 chars:",JSON.stringify(txt.substring(0,200)));
/* Flexible label grabber */
const gl=(label)=>{
const r1=new RegExp(label+"\\s*\\*?\\s*:?\\s*\\n([^\\n]+)","i");
const r2=new RegExp(label+"\\s*\\*?\\s*:\\s*([^\\n]+)","i");
const m=txt.match(r1)||txt.match(r2);
return m?m[1]?.trim()||"":""};
/* Name — try every possible format */
let firstName=gl("First Name")||gl("First name")||"";
let lastName=gl("Last Name")||gl("Last name")||"";
let fullName=(firstName+" "+lastName).trim();
console.log("PARSE DEBUG - firstName:",JSON.stringify(firstName),"lastName:",JSON.stringify(lastName));
/* Fallback 1: Applicant Name / Beneficiary Signature */
if(!fullName){const appNameM=txt.match(/Applicant Name\s*\n([^\n]+)/i)||txt.match(/Beneficiary Signature\s*:\s*([^\n]+)/i);if(appNameM)fullName=appNameM[1].trim()}
/* Fallback 2: LASTNAME, FIRSTNAME at top */
if(!fullName){const topM=txt.match(/^([A-Z][A-Za-z]+),\s*([A-Z][A-Za-z]+)/m);if(topM)fullName=topM[2]+" "+topM[1]}
/* Fallback 3: Scan for common name patterns in text */
if(!fullName){const namePatterns=[/First\s*(?:name|Name)\s*[:*\s]*\n?\s*([A-Za-z]+)\s*\n.*?Last\s*(?:name|Name)\s*[:*\s]*\n?\s*([A-Za-z]+)/is];
for(const p of namePatterns){const m=txt.match(p);if(m){fullName=(m[1]+" "+m[2]).trim();break}}}
console.log("PARSE DEBUG - fullName after fallbacks:",JSON.stringify(fullName));
/* Title case names */
fullName=fullName.split(" ").map(w=>w.length>1?w.charAt(0).toUpperCase()+w.slice(1).toLowerCase():w.toUpperCase()).join(" ");
const dob=gl("Date Of Birth")||gl("Date of birth")||"";
const phone=gl("Primary Phone Number")||gl("Primary Telephone")||gl("Phone")||gl("Phone number")||"";
const rawEmail=gl("Email address")||gl("Email")||"";
const email=rawEmail.includes("@")?rawEmail:"";
const mbi=gl("Medicare Number")||gl("Medicare number")||gl("Medicare Number \\(MBI\\)")||gl("MBI")||"";
/* Address — UHC separate fields, Aetna separate fields, Sunfire single line */
let mailingAddress="",city="",state="",zipCode="";
const cityUHC=gl("City");const stateUHC=gl("State");const zipUHC=gl("ZIP Code")||gl("Zip Code");
let addrUHC="";
/* Aetna format: "Address (Line 1) * : value" */
const addrAetna=gl("Address \\(Line 1\\)");
const addr2Aetna=gl("Address \\(Line 2\\)");
if(addrAetna){addrUHC=addrAetna;if(addr2Aetna)addrUHC+=" "+addr2Aetna}
if(!addrUHC&&(cityUHC||stateUHC)){
const addrRe=/Primary Address or Institution Address[:\s]*\n([^\n]+)/gi;let am;
while((am=addrRe.exec(txt))!==null){const v=am[1].trim();if(v&&!["Yes","No","yes","no"].includes(v)&&!v.startsWith("Are ")&&v.length>5){addrUHC=v;break}}
}
const addr2=(!addrAetna)?gl("Address Line 2"):"";
if(addrUHC||cityUHC){mailingAddress=addrUHC+(addr2?(" "+addr2):"");city=cityUHC;state=stateUHC;zipCode=zipUHC}
else{const addrM=txt.match(/Residential Address\s*\n([^\n]+)/i);
if(addrM){const raw=addrM[1].trim();const parts=raw.split(",").map(s=>s.trim());
const lastP=parts[parts.length-1];const szM=lastP.match(/([A-Z]{2})\s+(\d{5})/);
if(szM){state=szM[1];zipCode=szM[2]}
if(parts.length>=3){mailingAddress=parts[0];city=parts[1]}
else if(parts.length===2){mailingAddress=parts[0]}
else{mailingAddress=raw}}}
/* Plan */
const planM=txt.match(/Plan Name[:\s]*\n([^\n]+)/i)||txt.match(/Plan Name\s*\n([^\n]+(?:HMO|PPO|PFFS|SNP|PDP|MAPD)[^\n]*)/i)||txt.match(/Plan[:\s]*([^\n]+(?:HMO|PPO|PFFS|SNP|PDP|MAPD)[^\n]*)/i)||txt.match(/((?:Aetna|Humana|UHC|AARP|WellCare|Cigna|Devoted|Freedom|Zing)[^\n]+(?:HMO|PPO|PFFS|SNP|PDP)[^\n]*)/i);
let planName=planM?planM[1].trim().replace(/^Plan[:\s]*/i,""):"";
planName=planName.replace(/^IND\s*-\s*/i,"").replace(/\s*H\d{4}-\d{3}$/,"").trim();
/* Carrier */
const carriers=["Humana","UnitedHealthcare","UHC","AARP","Aetna","WellCare","Cigna","Devoted Health","Freedom Health","CarePlus","Molina","CareSource","Zing Health","Anthem","Blue Cross Blue Shield","Clover Health","Oscar Health","Centene","Alignment Health","Kaiser Permanente","Optimum HealthCare","Peoples Health"];
let carrier="";for(const c of carriers){if(txt.toLowerCase().includes(c.toLowerCase())){carrier=(c==="UHC"||c==="AARP")?"UnitedHealthcare":c;break}}
/* Dates */
const effM=txt.match(/Requested Effective Date\s*[:\s]*\s*(\d{2}\/\d{2}\/\d{4})/i)||txt.match(/Proposed Effective Date[:\s]*\n([^\n]+)/i)||txt.match(/Proposed effective date\s*\n([^\n]+)/i);
const effectiveDate=effM?effM[1].trim():"";
const appDateM=txt.match(/Beneficiary Signature Date\s*[:\s]*\s*([^\n]+)/i)||txt.match(/Applicant Signature Date\s*\n([^\n]+)/i)||txt.match(/Signature Date\s*\n([^\n]+)/i)||txt.match(/Voice\s*\|\s*(\d{2}-\d{2}-\d{4})/)||txt.match(/Date[:\s]*(\d{2}\/\d{2}\/\d{4})/);
let applicationDate=appDateM?appDateM[1].trim():"";
/* Election period — normalize "MA OEP" → "OEP", detect from text */
const epM=txt.match(/Election Period[:\s]*\n([^\n]+)/i)||txt.match(/Election period\s*\n([^\n]+)/i);
let electionPeriod=epM?epM[1].trim().toUpperCase():"";
electionPeriod=electionPeriod.replace(/^MA\s+/,"").replace(/^MAPD\s+/,"");
if(!electionPeriod){if(txt.includes("Open Enrollment Period"))electionPeriod="OEP";else if(txt.includes("Annual Enrollment"))electionPeriod="AEP";else if(txt.includes("Special Enrollment"))electionPeriod="SEP";else if(txt.includes("Initial Enrollment"))electionPeriod="IEP"}
electionPeriod=electionPeriod.replace(/^MA\s+/,"").replace(/^MAPD\s+/,"");
if(!["AEP","OEP","SEP","IEP","ICEP"].includes(electionPeriod)){if(electionPeriod.includes("OEP"))electionPeriod="OEP";else if(electionPeriod.includes("SEP"))electionPeriod="SEP";else if(electionPeriod.includes("AEP"))electionPeriod="AEP";else if(electionPeriod.includes("IEP"))electionPeriod="IEP"}
/* SEP code */
const sepCodeM=txt.match(/Sep code[:\s]*\n([^\n]+)/i);
const sepCode=sepCodeM?sepCodeM[1].trim().toUpperCase():"";
/* Plan type */
let planType="";const pnl=planName.toLowerCase();
if(pnl.includes("d-snp")||pnl.includes("dsnp"))planType="DSNP";
else if(pnl.includes("c-snp")||pnl.includes("csnp"))planType="CSNP";
else if(pnl.includes("pdp"))planType="PDP";
else if(pnl.includes("hmo")||pnl.includes("ppo")||pnl.includes("pffs")||pnl.includes("mapd"))planType="MAPD";
/* Previous carrier */
let previousCarrier="";const prevM=txt.match(/currently have a Medicare Supplement[^\n]*\n(Yes|No)/i);
if(prevM&&prevM[1].toLowerCase()==="yes")previousCarrier="Other";
/* Medicaid */
const medicaidNum=gl("Medicaid number")||gl("Medicaid Number")||"";
const medicaidEnrolled=txt.match(/enrolled in your state Medicaid[^\n]*\n\s*(Yes)/i)||txt.match(/Medicaid Program[^\n]*\n\s*(Yes)/i);
/* Date format */
const fmtD=(d)=>{if(!d)return"";const m=d.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);return m?m[3]+"-"+m[1].padStart(2,"0")+"-"+m[2].padStart(2,"0"):d};
return{fullName,phone,email,dob:fmtD(dob),applicationDate:fmtD(applicationDate),effectiveDate:fmtD(effectiveDate),mailingAddress,city,state,zipCode,mbiNumber:mbi,electionPeriod,sepCode,carrier,planName,planType,sunfireCode:"",medicaidLevel:"",medicaidNumber:medicaidNum,hospitalIndemnity:"",previousCarrier}
};

/* Carrier Commissions */
const parseRecon=()=>{
const lines=reconRaw.trim().split("\n");if(lines.length<2){flash("Need header + data rows","error");return}
const hdr=lines[0].split(/[,\t]/).map(h=>h.replace(/"/g,"").trim());
const rows2=lines.slice(1).map(l=>{const vals=[];let cur="",inQ=false;for(let i=0;i<l.length;i++){const ch=l[i];if(ch==='"')inQ=!inQ;else if((ch===","||ch==="\t")&&!inQ){vals.push(cur.trim());cur=""}else cur+=ch}vals.push(cur.trim());return vals}).filter(r=>r.some(v=>v));
setReconHdr(hdr);setReconRows(rows2);const autoMap={};
hdr.forEach((h,i)=>{const hl=h.toLowerCase();if(hl.includes("name")||hl.includes("member")||hl.includes("beneficiary")||hl.includes("insured"))autoMap[i]="name";else if(hl.includes("amount")||hl.includes("commission")||hl.includes("payment")||hl.includes("comp")||hl.includes("paid"))autoMap[i]="amount";else if(hl.includes("mbi")||hl.includes("hicn")||hl.includes("member id")||hl.includes("medicare"))autoMap[i]="mbi";else if(hl.includes("effective")||hl.includes("eff date"))autoMap[i]="effectiveDate";else if(hl.includes("plan")||hl.includes("product"))autoMap[i]="plan";else if(hl.includes("type")||hl.includes("transaction")||hl.includes("action")||hl.includes("fe")||hl.includes("be")||hl.includes("front")||hl.includes("back"))autoMap[i]="txType"});
setReconMap(autoMap);setReconStep(2);flash("Parsed "+rows2.length+" rows")
};

const matchRecon=()=>{
const nameIdx=Object.entries(reconMap).find(([k,v])=>v==="name")?.[0];
const amtIdx=Object.entries(reconMap).find(([k,v])=>v==="amount")?.[0];
const mbiIdx=Object.entries(reconMap).find(([k,v])=>v==="mbi")?.[0];
const txIdx=Object.entries(reconMap).find(([k,v])=>v==="txType")?.[0];
if(!nameIdx&&!mbiIdx){flash("Map at least Name or MBI","error");return}
/* Only match against my clients for this carrier */
const myCls=cls.filter(c=>(!reconCarrier||!c.carrier||(c.carrier||"").toLowerCase().includes(reconCarrier.toLowerCase()))&&(isA||c.agentId===cu.uid));
const matches=reconRows.map(row=>{
const rName=(nameIdx!=null?row[nameIdx]:"").toLowerCase().replace(/[^a-z ]/g,"").trim();
const rMbi=(mbiIdx!=null?row[mbiIdx]:"").replace(/[^A-Za-z0-9]/g,"").toUpperCase();
const rAmt=amtIdx!=null?parseFloat(row[amtIdx].replace(/[^0-9.\-]/g,""))||0:0;
const rTx=(txIdx!=null?row[txIdx]:"").toLowerCase();
/* Detect chargeback */
const isCB=rAmt<0||rTx.includes("chargeback")||rTx.includes("clawback")||rTx.includes("reversal")||rTx.includes("recoup")||rTx.includes("refund");
const isFE=rTx.includes("fe")||rTx.includes("front")||rTx.includes("initial");
const isBE=rTx.includes("be")||rTx.includes("back")||rTx.includes("backend")||rTx.includes("residual");
/* Match by MBI first, then exact name, then fuzzy name */
let match=null;let conf="none";
if(rMbi){match=myCls.find(c=>(c.mbiNumber||"").replace(/[^A-Za-z0-9]/g,"").toUpperCase()===rMbi);if(match)conf="mbi"}
if(!match&&rName){match=myCls.find(c=>(c.fullName||"").toLowerCase().replace(/[^a-z ]/g,"").trim()===rName);if(match)conf="name"}
if(!match&&rName){match=myCls.find(c=>{const cn=(c.fullName||"").toLowerCase().replace(/[^a-z ]/g,"").trim().split(" ");const rn=rName.split(" ");return rn.length>=2&&cn.length>=2&&((cn[0]===rn[0]&&cn[cn.length-1]===rn[rn.length-1])||(cn[0]===rn[rn.length-1]&&cn[cn.length-1]===rn[0]))});if(match)conf="fuzzy"}
const expected=match?getComm(match):0;
const absAmt=Math.abs(rAmt);
let payType="unknown";
if(isCB)payType="chargeback";
else if(match&&absAmt>0&&Math.abs(absAmt-expected)<=1)payType="full";
else if(match&&absAmt>0&&absAmt<expected)payType="partial";
else if(match&&absAmt>0&&absAmt>expected)payType="overpay";
else if(match&&absAmt>0)payType="full";
else if(!match&&absAmt>0)payType="unmatched";
return{row,rName:nameIdx!=null?row[nameIdx]:"—",rAmt,rMbi:mbiIdx!=null?row[mbiIdx]:"",match,conf,expected,payType,isCB,isFE,isBE,absAmt}
});
/* Find clients with this carrier NOT on statement (missing payments) */
const matchedIds=new Set(matches.filter(m=>m.match).map(m=>m.match.id));
const missing=myCls.filter(c=>(c.status==="active")&&!matchedIds.has(c.id));
setReconMatches(matches);setReconStep(3);
/* Auto-select full-payment matches */
const autoSel=new Set();matches.forEach((m,i)=>{if(m.match&&(m.payType==="full"||m.payType==="partial"||m.payType==="overpay")&&!m.isCB)autoSel.add(i)});
setReconSel(autoSel);
const matched=matches.filter(m=>m.match).length;
flash("Found "+matched+" matches, "+missing.length+" missing from statement")
};

const applyRecon=async()=>{
const selected=reconMatches.filter((m,i)=>reconSel.has(i)&&m.match);
if(selected.length===0){flash("Select at least one row","error");return}
const b=db.batch();
selected.forEach(m=>{
const updates={};const logDetail=[];
if(m.isCB){
updates.status="chargedBack";updates.chargebackDate=td();updates.chargebackAmount=String(m.absAmt);
logDetail.push("Chargeback: -$"+m.absAmt+" ("+reconCarrier+")");
}else{
updates.status="paid";updates.paidDate=td();updates.commissionAmount=String(m.absAmt);
if(m.payType==="partial")logDetail.push("Paid by carrier: $"+m.absAmt+" (expected $"+m.expected+") ("+reconCarrier+")");
else if(m.payType==="overpay")logDetail.push("Paid by carrier: $"+m.absAmt+" (expected $"+m.expected+") ("+reconCarrier+")");
else logDetail.push("Paid by carrier: $"+m.absAmt+" ("+reconCarrier+")");
}
updates.activityLog=firebase.firestore.FieldValue.arrayUnion({ts:estTS(),user:up?.displayName||"System",action:"status",detail:logDetail[0]});
b.update(db.collection("clients").doc(m.match.id),updates);
});
await b.commit();
/* Write commission history records */
const hBatch=db.batch();
selected.forEach(m=>{
const ag=team.find(u=>u.uid===m.match.agentId);
const agRole=ag?.role||"broker";
const isHeap=agRole==="heap";
if(m.isCB){
/* Chargeback - same for broker and heap */
hBatch.set(db.collection("commissionHistory").doc(),{date:td(),carrier:reconCarrier,clientName:m.match.fullName,clientId:m.match.id,agentId:m.match.agentId||"",agentRole:agRole,amount:-m.absAmt,type:"chargeback",expected:m.expected,reconBy:up?.displayName||"Admin",createdAt:firebase.firestore.FieldValue.serverTimestamp()});
}else if(isHeap){
/* HEAP: detect FE vs BE from statement or default to FE */
const feAmt=isA?Number(ag?.heapFrontEnd)||0:Number(up?.heapFrontEnd)||0;

const SCRIPTS=[
{cat:"Opening",title:"Cold Call Opener",body:"Hi, this is {agent} with United Insurance Professionals. I'm reaching out because I help people in your area review their Medicare options to make sure they're getting the most out of their benefits. Do you have about 2 minutes?",tips:["Sound natural, not scripted","Pause after asking — let them respond","If they say no, ask 'Is there a better time to call back?'"]},
{cat:"Opening",title:"Warm Referral",body:"Hi {name}, I'm {agent} with United Insurance Professionals. {referrer} suggested I reach out to you — they thought you might benefit from a free Medicare plan review. I help people make sure they're not overpaying or missing benefits. Would you like to chat for a few minutes?",tips:["Name-drop the referrer early","Emphasize 'free' and 'no obligation'","Have referrer's details ready in case they ask"]},
{cat:"Opening",title:"Door Knock Intro",body:"Hi there! I'm {agent} with United Insurance Professionals. I'm in the neighborhood today helping folks review their Medicare coverage. A lot of people don't realize they might qualify for extra benefits or lower costs. Mind if I take just a couple minutes of your time?",tips:["Smile, step back from door","Have badge/ID visible","Leave a business card even if they say no"]},
{cat:"Needs Analysis",title:"Discovery Questions",body:"Let me ask you a few questions to make sure I find the right fit for you:\n\n1. What doctors do you see regularly?\n2. What prescriptions are you currently taking?\n3. Do you have any upcoming surgeries or procedures planned?\n4. How important is keeping your current doctors?\n5. Do you travel or spend time in another state?\n6. Are you currently getting any help from Medicaid?\n7. What's most important to you in a health plan — low costs, keeping your doctors, or extra benefits?",tips:["Listen more than you talk","Take notes","Don't recommend a plan until you have all the answers","Ask about spouse too"]},
{cat:"Needs Analysis",title:"Current Plan Review",body:"Can you tell me about your current plan? Who is it with?\n\nGreat — and are you happy with it? Any issues you've had?\n\nWhat are you paying for your Part D?\nAny medications that aren't covered or cost too much?\nAre all your doctors in-network?\n\nLet me pull up what's available in your area and see if we can do better.",tips:["Never bash their current plan","Focus on what they're missing, not what's wrong","If they love their plan, compliment their choice and check for savings"]},
{cat:"Closing",title:"Soft Close",body:"Based on everything you've told me, the {carrier} plan looks like the best fit because [reasons]. It keeps your doctors in-network, covers your medications, and actually gives you some extra benefits you don't have now.\n\nWould you like me to get you enrolled today? The application only takes about 10 minutes and everything goes effective {effective}.",tips:["Summarize their specific needs and how the plan addresses each","Don't rush — let them process","Have the application ready to go"]},
{cat:"Closing",title:"Urgency Close (AEP)",body:"I want to make sure you know that open enrollment ends December 7th. After that, you'd have to wait until next year to make any changes. Based on what we discussed, this plan saves you money and gives you better coverage. Should we get the application started so you're all set for January 1st?",tips:["Only use real urgency, never fake deadlines","Reference specific savings numbers","Have enrollment form ready"]},
{cat:"Objection",title:"'I need to think about it'",body:"Absolutely, this is an important decision. What specifically would you like to think about? Is it the cost, the doctors, or something else?\n\n[After they respond]\n\nThat makes sense. Let me address that for you...\n\nIf they still want time: I completely understand. How about I check back with you on [day]? And in the meantime, here's my card — call me anytime if questions come up.",tips:["Never pressure","Identify the real objection behind 'think about it'","Set a specific follow-up date","Leave materials with them"]},
{cat:"Objection",title:"'I'm happy with my plan'",body:"That's great to hear — I'm glad you have a plan you like! Out of curiosity, when was the last time you compared it to what else is available? Plans change every year, and sometimes there are new options that offer the same coverage for less, or extra benefits you might not know about.\n\nWould it hurt to do a quick comparison? If your current plan is still the best, I'll be the first to tell you to keep it.",tips:["Validate their satisfaction","Position as a 'checkup' not a switch","Focus on what they might be missing","Be genuinely willing to confirm their current plan is best"]},
{cat:"Objection",title:"'I don't trust insurance agents'",body:"I totally understand that concern, and honestly, you should be careful. There are agents out there who don't put the client first. Here's what makes me different: I don't work for one insurance company — I work for you. I compare plans from multiple carriers and my only job is to find what's best for your situation. And my services are completely free to you — Medicare pays me, not you. Plus, you can change plans every year, so you're never locked in.",tips:["Acknowledge their concern as valid","Emphasize independence and free service","Offer references from other clients","Don't get defensive"]},
{cat:"Objection",title:"'My friend/family handles my insurance'",body:"That's wonderful that you have someone you trust! Are they a licensed Medicare agent? The reason I ask is that Medicare plans change every year, and unless someone is tracking all the carrier updates, it's easy to miss a better option. I'd be happy to do a free side-by-side comparison — if they already have you in the best plan, I'll confirm it. Would that be okay?",tips:["Never badmouth their contact","Position as a second opinion","Offer to work WITH their person","If they decline, leave your card for future reference"]},
{cat:"Compliance",title:"SOA Script",body:"Before we discuss any specific plan options, I need to go over a few things with you. I'm {agent}, a licensed insurance agent. This appointment is to review Medicare Advantage and/or Part D prescription drug plan options. You're not obligated to enroll in anything today, and there's no cost to you for this appointment. I represent multiple carriers including [list carriers]. I need your permission to discuss these plans with you — is that okay? Great, I'll have you sign this Scope of Appointment form which just confirms what we'll be talking about today.",tips:["ALWAYS do SOA before discussing plans","Document the date and time","Keep signed SOAs for 10 years","Never skip this — it's a CMS requirement"]},
{cat:"Compliance",title:"Recording Disclaimer",body:"I want to let you know that for quality and compliance purposes, this call may be recorded. By continuing our conversation, you're agreeing to be recorded. Is that alright with you?",tips:["Required if recording calls","Get verbal confirmation","Note the time of consent","If they decline recording, turn it off and note that in your records"]}

{cat:"Getting Started",items:[
{title:"Medicare Basics 101",desc:"Understanding Parts A, B, C, D and how they work together",content:"**Medicare Parts:**\n\n**Part A (Hospital):** Covers inpatient hospital, skilled nursing, hospice. Most people don't pay a premium.\n\n**Part B (Medical):** Covers doctor visits, outpatient, preventive. Standard premium ~$185/mo (2026).\n\n**Part C (Medicare Advantage):** Private plans that bundle A+B, usually include D. Can have $0 premiums and extra benefits (dental, vision, hearing, OTC).\n\n**Part D (Prescription):** Standalone drug plans. Required if not in an MA plan with drug coverage.\n\n**Medigap/Supplement:** Fills gaps in Original Medicare. Can't have with MA plan."},

<div style={{padding:12,background:"var(--hover)",borderRadius:10}}><div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",color:"var(--t3)",letterSpacing:.5}}>Phone</div><div style={{fontSize:14,fontWeight:600,marginTop:4}}>{fmtPh(c.phone)}</div></div>
<div style={{padding:12,background:"var(--hover)",borderRadius:10}}><div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",color:"var(--t3)",letterSpacing:.5}}>State</div><div style={{fontSize:14,fontWeight:600,marginTop:4}}>{c.state||"\u2014"}</div></div>
<div style={{padding:12,background:"var(--hover)",borderRadius:10}}><div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",color:"var(--t3)",letterSpacing:.5}}>Election Period</div><div style={{fontSize:14,fontWeight:600,marginTop:4}}>{c.electionPeriod||"\u2014"}</div></div>
</div>
{revPass===1?<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(90px,1fr))",gap:8}}>
<button onClick={()=>revAction("active")} style={{padding:12,borderRadius:12,border:"2px solid #22C55E",background:"#22C55E10",cursor:"pointer",textAlign:"center",fontFamily:"var(--font)"}}><div style={{fontSize:24}}>{"\u2705"}</div><div style={{fontSize:11,fontWeight:700,color:"#22C55E",marginTop:4}}>On Book</div><div style={{fontSize:9,color:"var(--t3)",marginTop:2}}>Press 1</div></button>
<button onClick={()=>revAction("inactive")} style={{padding:12,borderRadius:12,border:"2px solid #EF4444",background:"#EF444410",cursor:"pointer",textAlign:"center",fontFamily:"var(--font)"}}><div style={{fontSize:24}}>{"\u274C"}</div><div style={{fontSize:11,fontWeight:700,color:"#EF4444",marginTop:4}}>Left Book</div><div style={{fontSize:9,color:"var(--t3)",marginTop:2}}>Press 2</div></button>
<button onClick={()=>revAction("noEnroll")} style={{padding:12,borderRadius:12,border:"2px solid #94A3B8",background:"#94A3B810",cursor:"pointer",textAlign:"center",fontFamily:"var(--font)"}}><div style={{fontSize:24}}>{"\u26D4"}</div><div style={{fontSize:11,fontWeight:700,color:"#94A3B8",marginTop:4}}>Didn't Enroll</div><div style={{fontSize:9,color:"var(--t3)",marginTop:2}}>Press 3</div></button>
<button onClick={()=>revAction("diffPlan")} style={{padding:12,borderRadius:12,border:"2px solid #F97316",background:"#F9731610",cursor:"pointer",textAlign:"center",fontFamily:"var(--font)"}}><div style={{fontSize:24}}>{"\uD83D\uDD04"}</div><div style={{fontSize:11,fontWeight:700,color:"#F97316",marginTop:4}}>Diff Plan</div><div style={{fontSize:9,color:"var(--t3)",marginTop:2}}>Press 4</div></button>
<button onClick={()=>revAction("skip")} style={{padding:12,borderRadius:12,border:"2px solid var(--border)",background:"var(--hover)",cursor:"pointer",textAlign:"center",fontFamily:"var(--font)"}}><div style={{fontSize:24}}>{"\u23ED"}</div><div style={{fontSize:11,fontWeight:700,color:"var(--t3)",marginTop:4}}>Skip</div><div style={{fontSize:9,color:"var(--t3)",marginTop:2}}>Press 5</div></button>
</div>
:<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
<button onClick={()=>revAction("paid")} style={{padding:16,borderRadius:12,border:"2px solid #3B8FD9",background:"#3B8FD910",cursor:"pointer",textAlign:"center",fontFamily:"var(--font)"}}><div style={{fontSize:28}}>{"\uD83D\uDCB0"}</div><div style={{fontSize:13,fontWeight:700,color:"#3B8FD9",marginTop:4}}>Got Paid</div><div style={{fontSize:10,color:"var(--t3)",marginTop:2}}>Press 1</div></button>
<button onClick={()=>revAction("active")} style={{padding:16,borderRadius:12,border:"2px solid #F59E0B",background:"#F59E0B10",cursor:"pointer",textAlign:"center",fontFamily:"var(--font)"}}><div style={{fontSize:28}}>{"\u23F3"}</div><div style={{fontSize:13,fontWeight:700,color:"#F59E0B",marginTop:4}}>Not Yet</div><div style={{fontSize:10,color:"var(--t3)",marginTop:2}}>Press 2</div></button>
<button onClick={()=>revAction("skip")} style={{padding:16,borderRadius:12,border:"2px solid var(--border)",background:"var(--hover)",cursor:"pointer",textAlign:"center",fontFamily:"var(--font)"}}><div style={{fontSize:28}}>{"\u23ED"}</div><div style={{fontSize:13,fontWeight:700,color:"var(--t3)",marginTop:4}}>Skip</div><div style={{fontSize:10,color:"var(--t3)",marginTop:2}}>Press 3</div></button>
</div>}
</div></div></div>})()}

{/* MASS UPDATE MODAL */}
{showMU&&<Mdl onClose={()=>setShowMU(false)} width={640} title={"\u26A1 Mass Update"} subtitle={muSel.size+" of "+disp.length+" clients selected"}>
<div style={{padding:"16px 24px",display:"flex",gap:14,borderBottom:"1px solid var(--border)"}}>
<div style={{flex:1}}><label style={{fontSize:11,fontWeight:700,textTransform:"uppercase",color:"var(--t3)"}}>Field</label>
<select value={mf} onChange={e=>{setMf(e.target.value);setMv("")}} style={{...inp,marginTop:4,cursor:"pointer"}}><option value="">Select field...</option>
<option value="hospitalIndemnity">Hospital Indemnity</option><option value="planType">Plan Type</option><option value="medicaidLevel">Medicaid Level</option><option value="carrier">Carrier</option><option value="electionPeriod">Election Period</option><option value="state">State</option><option value="previousCarrier">Previous Carrier</option>
</select></div>
{mf&&<div style={{flex:1}}><label style={{fontSize:11,fontWeight:700,textTransform:"uppercase",color:"var(--t3)"}}>New value</label>
<select value={mv} onChange={e=>setMv(e.target.value)} style={{...inp,marginTop:4,cursor:"pointer"}}><option value="">Select value...</option>
{(FIELDS.find(f=>f.key===mf)?.options||[]).map(o=><option key={o} value={o}>{o}</option>)}
</select></div>}
</div>
<div style={{padding:"10px 24px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid var(--border)"}}>
<div style={{display:"flex",gap:10,alignItems:"center"}}>
<button onClick={()=>setMuSel(new Set(disp.map(c=>c.id)))} style={{...bO,fontSize:11,padding:"4px 10px"}}>Select All</button>
<button onClick={()=>setMuSel(new Set())} style={{...bO,fontSize:11,padding:"4px 10px"}}>Select None</button>
</div>
<span style={{fontSize:12,fontWeight:700,color:muSel.size>0?"#3B8FD9":"var(--t3)"}}>{muSel.size+" selected"}</span>
</div>
<div style={{maxHeight:"45vh",overflowY:"auto",padding:"8px 24px"}}>
{disp.map(c=>{const sel=muSel.has(c.id);const cur=mf?c[mf]||"":"";return<div key={c.id} onClick={()=>{const n=new Set(muSel);if(sel)n.delete(c.id);else n.add(c.id);setMuSel(n)}} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 12px",borderRadius:8,cursor:"pointer",background:sel?"var(--tabBg)":"transparent",border:"1px solid "+(sel?"#3B8FD9":"transparent"),marginBottom:2}} onMouseEnter={e=>{if(!sel)e.currentTarget.style.background="var(--hover)"}} onMouseLeave={e=>{if(!sel)e.currentTarget.style.background="transparent"}}>
<div style={{width:20,height:20,borderRadius:6,border:"2px solid "+(sel?"#3B8FD9":"var(--border)"),background:sel?"#3B8FD9":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{sel&&<span style={{color:"#fff",fontSize:12,fontWeight:900}}>{"\u2713"}</span>}</div>
<div style={{flex:1,minWidth:0}}><div style={{fontWeight:600,fontSize:13}}>{c.fullName}</div><div style={{fontSize:11,color:"var(--t3)"}}>{fmtCar(c.carrier)}{c.state?" \u00B7 "+c.state:""}{c.planType?" \u00B7 "+c.planType:""}</div></div>
{mf&&<div style={{fontSize:11,color:"var(--t3)",textAlign:"right",flexShrink:0}}>{cur||"\u2014"}{mv&&cur!==mv&&<span style={{color:"#3B8FD9",fontWeight:700}}>{" \u2192 "+mv}</span>}</div>}
</div>})}
</div>
{mf&&mv&&muSel.size>0&&<div style={{padding:"8px 24px"}}><div style={{padding:10,background:"var(--alertYBg)",border:"1px solid var(--alertYBdr)",borderRadius:10,fontSize:12,color:"var(--alertYTxt)"}}>{"Will set "+(FIELDS.find(f=>f.key===mf)?.label||mf)+" to \""+mv+"\" on "+muSel.size+" clients."}</div></div>}
<div style={{padding:"14px 24px",borderTop:"1px solid var(--border)",display:"flex",justifyContent:"flex-end",gap:10}}><button onClick={()=>setShowMU(false)} style={bO}>Cancel</button><button onClick={doMU} disabled={!mf||!mv||muSel.size===0} style={{...bP,opacity:mf&&mv&&muSel.size>0?1:.4}}>{"Update "+muSel.size+" Clients"}</button></div>
</Mdl>}

{/* REORDER MODAL */}
{showReorder&&<Mdl onClose={()=>setShowReorder(false)} width={600} title={"\uD83D\uDD00 Reorder Clients"} subtitle={"Step "+reoStep+" of 2"}>
{reoStep===1&&<div style={{padding:24}}><div style={{fontSize:13,color:"var(--t2)",marginBottom:12}}>Paste a column of MBI numbers from your spreadsheet. Matched clients will be reordered to this sequence.</div><textarea value={reoRaw} onChange={e=>setReoRaw(e.target.value)} placeholder={"8VH7JM0QT49\n4RK2NP8WX61\n7BM3HA9YZ22\n..."} style={{...inp,height:200,resize:"vertical",fontFamily:"monospace",fontSize:12}}/></div>}
{reoStep===2&&<div style={{padding:24,maxHeight:"55vh",overflowY:"auto"}}>
<div style={{display:"flex",gap:10,marginBottom:16}}>
<div style={{padding:"8px 14px",borderRadius:8,background:"var(--alertGBg)",border:"1px solid var(--alertGBdr)",fontSize:13}}><strong style={{color:"#22C55E"}}>{reoMatches.filter(m=>m.matched).length}</strong>{" matched"}</div>
<div style={{padding:"8px 14px",borderRadius:8,background:"var(--alertRBg)",border:"1px solid var(--alertRBdr)",fontSize:13}}><strong style={{color:"#EF4444"}}>{reoMatches.filter(m=>!m.matched).length}</strong>{" not found"}</div>
</div>
{reoMatches.map((m,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",borderRadius:8,background:m.matched?"var(--alertGBg)":"var(--alertRBg)",border:"1px solid "+(m.matched?"var(--alertGBdr)":"var(--alertRBdr)"),marginBottom:4}}>
<span style={{fontSize:12,fontWeight:700,color:"var(--t3)",width:24}}>{i+1}</span>
<span style={{fontSize:12,fontFamily:"monospace",width:120}}>{m.mbi}</span>
<span style={{fontSize:13,fontWeight:600,flex:1}}>{m.matched?m.name:"—"}</span>
<span style={{fontSize:11,fontWeight:700,color:m.matched?"#22C55E":"#EF4444"}}>{m.matched?"\u2713 Matched":"\u2717 Not found"}</span>
</div>)}
</div>}
<div style={{padding:"14px 24px",borderTop:"1px solid var(--border)",display:"flex",justifyContent:"space-between"}}>
<button onClick={()=>{if(reoStep===1)setShowReorder(false);else setReoStep(1)}} style={bO}>{reoStep===1?"Cancel":"\u2190 Back"}</button>
{reoStep===1&&<button onClick={parseReorder} disabled={!reoRaw.trim()} style={{...bP,opacity:reoRaw.trim()?1:.4}}>{"Preview \u2192"}</button>}
{reoStep===2&&<button onClick={applyReorder} disabled={reoMatches.filter(m=>m.matched).length===0} style={{...bP,opacity:reoMatches.filter(m=>m.matched).length>0?1:.4}}>{"Apply Order ("+reoMatches.filter(m=>m.matched).length+")"}</button>}
</div>
</Mdl>}

</div>);
}

/* ═══════════ APP WRAPPER ═══════════ */
function App(){
/* Error boundary */
class EB extends React.Component{
constructor(p){super(p);this.state={err:null}}
static getDerivedStateFromError(e){return{err:e}}
componentDidCatch(e,info){console.error("React error:",e,info)}
render(){if(this.state.err)return React.createElement("div",{style:{padding:40,fontFamily:"monospace",fontSize:14,color:"#EF4444",background:"#1E293B",minHeight:"100vh",whiteSpace:"pre-wrap"}},
"Error: "+this.state.err.toString()+"\n\n"+(this.state.err.stack||""));return this.props.children}
}
const[user,setUser]=useState(null);const[prof,setProf]=useState(null);const[ld,setLd]=useState(true);
useEffect(()=>{const un=auth.onAuthStateChanged(async u=>{if(u){setUser(u);try{const d=await db.collection("users").doc(u.uid).get();if(d.exists)setProf(d.data());else{const un2=db.collection("users").doc(u.uid).onSnapshot(s=>{if(s.exists){setProf(s.data());un2()}})}}catch(e){console.error(e)}}else{setUser(null);setProf(null)}setLd(false)});return()=>un()},[]);
if(ld)return<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",fontFamily:"'Inter',sans-serif"}}><div style={{fontSize:18,fontWeight:700,color:"#64748B"}}>Loading...</div></div>;
if(!user)return<LoginScreen/>;
if(!prof)return<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",fontFamily:"'Inter',sans-serif"}}><div style={{fontSize:14,color:"#64748B"}}>Setting up...</div></div>;
if(prof.disabled)return<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",fontFamily:"'Inter',sans-serif",background:"#F8FAFC"}}><div style={{background:"#fff",borderRadius:16,padding:40,maxWidth:400,textAlign:"center",boxShadow:"0 4px 20px rgba(0,0,0,.08)",border:"1px solid #E2E8F0"}}><div style={{fontSize:40,marginBottom:16}}>{"\u26D4"}</div><div style={{fontSize:18,fontWeight:800,color:"#0F172A",marginBottom:8}}>Account Disabled</div><div style={{fontSize:14,color:"#64748B",marginBottom:20}}>Your account has been disabled by an administrator. Contact your admin for assistance.</div><button onClick={()=>auth.signOut()} style={{padding:"10px 24px",borderRadius:10,border:"none",background:"#3B8FD9",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"'Inter',sans-serif"}}>Sign Out</button></div></div>;
return<EB><Tracker cu={user} up={prof}/></EB>;
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
