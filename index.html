</div>
{Object.keys(ana.hByAg).length>0&&<MT headers={["Agent","Total","Earned","Dropped","NIE","Agent Pay","Your Profit","FE/BE"]} rows={Object.values(ana.hByAg).map(a=>[<strong>{a.name}</strong>,<strong>{a.total}</strong>,<span style={{color:"#22C55E",fontWeight:700}}>{a.earned}</span>,<span style={{color:"#EF4444",fontWeight:700}}>{a.dropped}</span>,<span style={{color:"#94A3B8",fontWeight:700}}>{a.nie}</span>,<strong>{money(a.agPay)}</strong>,<strong style={{color:"#22C55E"}}>{money(a.admProf)}</strong>,<span style={{fontSize:11}}>{"$"+a.fe+"/$"+a.be}</span>])}/>}
<div style={{marginTop:12,padding:10,background:"var(--hover)",borderRadius:8,fontSize:12,color:"var(--t2)"}}>{"HEAP total per sale: $"+HEAP_FE+" FE + $"+HEAP_BE+" BE = $"+HEAP_TOT+". Your margin = total minus agent pay. Early drops: FE charges back, BE removed."}</div>
</Crd>
</div>}
{/* Broker Referral Overview */}
{Object.keys(ana.brkByAg).length>0&&<div style={{marginBottom:20}}>
<Crd title={"\uD83E\uDD1D Broker Referral Overview"}>
<div style={{display:"flex",gap:14,flexWrap:"wrap",marginBottom:16}}>
<div style={{textAlign:"center",padding:14,background:"var(--hover)",borderRadius:10,flex:"1 1 100px"}}><div style={{fontSize:22,fontWeight:800,color:"#22C55E"}}>{money(ana.admBrkProfit)}</div><div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",color:"var(--t3)",marginTop:4}}>Your Broker Ref Profit</div></div>
</div>
<MT headers={["Broker","Clients","New to Medicare ($100)","Carrier Switch ($50)","Same Carrier ($25)","Your Profit"]} rows={Object.values(ana.brkByAg).map(a=>[<strong>{a.name}</strong>,<strong>{a.total}</strong>,<span style={{color:"#22C55E",fontWeight:700}}>{a.newMed}</span>,<span style={{color:"#3B8FD9",fontWeight:700}}>{a.switched}</span>,<span style={{color:"var(--t3)",fontWeight:700}}>{a.sameCar}</span>,<strong style={{color:"#22C55E"}}>{money(a.refProfit)}</strong>])}/>
<div style={{marginTop:12,padding:10,background:"var(--hover)",borderRadius:8,fontSize:12,color:"var(--t2)"}}>{"You earn $"+BROKER_REF_NEW+" per new-to-Medicare, $"+BROKER_REF_SWITCH+" per carrier switch, and $"+BROKER_REF_SAME+" per same-carrier plan change from broker sales."}</div>
</Crd>
</div>}
{/* Agent Performance Comparison */}
{agS.filter(u=>u.role!=="admin").length>0&&<div style={{marginBottom:20}}>
<Crd title={"\uD83C\uDFC6 Agent Performance Comparison"}>
<MT headers={["Agent","Role","Clients","In Force","Dropped","Retention","Avg Commission","Total Commission","Your Profit"]} rows={agS.filter(u=>u.role!=="admin").map(a=>{
const ret=a.tot>0?pct(a.inf,a.tot):"0%";
const avgC=a.inf>0?money(a.pc/a.inf):"$0";
return[
<strong>{a.displayName}</strong>,
<Badge color={a.role==="heap"?"#F97316":"#22C55E"}>{a.role}</Badge>,
<strong>{a.tot}</strong>,
<span style={{color:"#22C55E",fontWeight:700}}>{a.inf}</span>,
<span style={{color:"#EF4444",fontWeight:700}}>{a.dr}</span>,
<span style={{fontWeight:800,color:a.tot>0&&a.inf/a.tot>=.85?"#22C55E":a.tot>0&&a.inf/a.tot>=.7?"#F59E0B":"#EF4444"}}>{ret}</span>,
avgC,
<strong style={{color:"#22C55E"}}>{money(a.pc)}</strong>,
<strong style={{color:"#3B8FD9"}}>{money(a.ap)}</strong>
]})}/>
{agS.filter(u=>u.role!=="admin").length>=2&&<div style={{marginTop:16,display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:12}}>
{(()=>{const agents=agS.filter(u=>u.role!=="admin"&&u.tot>0);if(agents.length===0)return null;const topProd=agents.sort((a,b)=>b.tot-a.tot)[0];const topRet=agents.filter(a=>a.tot>=3).sort((a,b)=>(b.inf/b.tot)-(a.inf/a.tot))[0];const topComm=agents.sort((a,b)=>b.pc-a.pc)[0];const topProfit=agents.sort((a,b)=>b.ap-a.ap)[0];
return<>
{topProd&&<div style={{padding:12,background:"var(--hover)",borderRadius:10,textAlign:"center"}}><div style={{fontSize:20}}>{"\uD83C\uDFC5"}</div><div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",color:"var(--t3)",marginTop:4}}>Most Production</div><div style={{fontSize:14,fontWeight:800,marginTop:2}}>{topProd.displayName}</div><div style={{fontSize:12,color:"var(--t2)"}}>{topProd.tot+" clients"}</div></div>}
{topRet&&<div style={{padding:12,background:"var(--hover)",borderRadius:10,textAlign:"center"}}><div style={{fontSize:20}}>{"\uD83D\uDEE1\uFE0F"}</div><div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",color:"var(--t3)",marginTop:4}}>Best Retention</div><div style={{fontSize:14,fontWeight:800,marginTop:2}}>{topRet.displayName}</div><div style={{fontSize:12,color:"var(--t2)"}}>{pct(topRet.inf,topRet.tot)}</div></div>}
{topComm&&<div style={{padding:12,background:"var(--hover)",borderRadius:10,textAlign:"center"}}><div style={{fontSize:20}}>{"\uD83D\uDCB0"}</div><div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",color:"var(--t3)",marginTop:4}}>Top Commission</div><div style={{fontSize:14,fontWeight:800,marginTop:2}}>{topComm.displayName}</div><div style={{fontSize:12,color:"var(--t2)"}}>{money(topComm.pc)}</div></div>}
{topProfit&&topProfit.ap>0&&<div style={{padding:12,background:"var(--hover)",borderRadius:10,textAlign:"center"}}><div style={{fontSize:20}}>{"\uD83D\uDCB5"}</div><div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",color:"var(--t3)",marginTop:4}}>Top Profit (You)</div><div style={{fontSize:14,fontWeight:800,marginTop:2}}>{topProfit.displayName}</div><div style={{fontSize:12,color:"var(--t2)"}}>{money(topProfit.ap)}</div></div>}
</>})()}
</div>}
</Crd>
</div>}
{/* Agent list */}
<div style={{display:"flex",flexDirection:"column",gap:8}}>
<div style={{display:"grid",gridTemplateColumns:"1.5fr .7fr .5fr .5fr .5fr .7fr .7fr 1fr .5fr",gap:10,padding:"8px 18px",fontSize:10,fontWeight:700,color:"var(--t3)",textTransform:"uppercase",letterSpacing:.8}}><div>Name</div><div>Role</div><div>Clients</div><div>In Force</div><div>Dropped</div><div>Commission</div><div>Your Profit</div><div>Pay</div><div>Actions</div></div>
{agS.map(u=><div key={u.uid} style={{display:"grid",gridTemplateColumns:"1.5fr .7fr .5fr .5fr .5fr .7fr .7fr 1fr .5fr",gap:10,padding:"14px 18px",borderRadius:10,background:"var(--card)",border:"1px solid var(--border)",alignItems:"center",boxShadow:"var(--cs)"}}>
<div><div style={{fontWeight:700,fontSize:14}}>{u.displayName}</div><div style={{fontSize:11,color:"var(--t3)"}}>{u.email}</div></div>
<Badge color={u.role==="admin"?"#3B8FD9":u.role==="heap"?"#F97316":"#22C55E"}>{u.role}</Badge>
<div style={{fontWeight:700}}>{u.role==="admin"?ana.allClientsCount:u.tot}{u.arch>0&&<span style={{fontSize:10,color:"var(--t3)"}}>{" +"+u.arch}</span>}</div>
<div style={{fontWeight:700,color:"#22C55E"}}>{u.role==="broker"?u.inf:"\u2014"}</div>
<div style={{fontWeight:700,color:"#EF4444"}}>{u.role==="broker"?u.dr:"\u2014"}</div>
<div style={{fontWeight:700,color:"#22C55E"}}>{u.role==="admin"?money(ana.projInit):money(u.pc)}</div>
<div style={{fontWeight:700,color:(u.role==="heap"||u.role==="broker")?"#3B8FD9":"#F97316"}}>{u.role==="admin"?money(ana.totalProfit):u.role==="heap"||u.role==="broker"?money(u.ap):"\u2014"}</div>
<div style={{fontSize:12}}>{u.role==="heap"?("FE: "+money(u.heapFrontEnd||0)+" / BE: "+money(u.heapBackEnd||0)):u.role==="broker"?"Broker formula":u.role==="admin"?"Prod + Overrides":"—"}</div>
<div style={{display:"flex",gap:6}}>
<button onClick={()=>{setSelAgent(u.uid);setTab("analytics")}} style={{...bO,fontSize:11,padding:"4px 10px"}}>{"\uD83D\uDCCA"}</button>
{u.role!=="admin"&&<button onClick={()=>setEditAgent({...u})} style={{...bO,fontSize:11,padding:"4px 10px"}}>{"\u270F\uFE0F"}</button>}
</div>
</div>)}
</div>
</div>}
</main>

{[{l:"Initial Commission",v:money(getComm(vc)),c:"#22C55E"},{l:"Residuals Started",v:resStart(vc.effectiveDate),c:"#3B8FD9"},{l:"Residual Earned",v:money(calcResEarned(vc.effectiveDate,td())),c:"#8B5CF6"},{l:"Total Earned",v:money(getComm(vc)+calcResEarned(vc.effectiveDate,td())),c:"#22C55E"},{l:"Chargeback",v:vc.chargebackAmount?money(vc.chargebackAmount):"\u2014",c:"#EF4444"},{l:"Cancelled",v:vc.cancelMonth?new Date(vc.cancelMonth+"-01T00:00:00").toLocaleDateString("en-US",{month:"short",year:"numeric"}):"\u2014"},{l:"Notes",v:vc.statusNote||"\u2014"}
].map(f=><div key={f.l} style={{padding:10,background:"var(--hover)",borderRadius:8}}><div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",color:"var(--t3)",letterSpacing:.5,marginBottom:3}}>{f.l}</div><div style={{fontSize:13,fontWeight:600,color:f.c||"var(--text)"}}>{f.v}</div></div>)}

/* ═══════════ APP WRAPPER ═══════════ */
function App(){
/* Error boundary */
class EB extends React.Component{
constructor(p){super(p);this.state={err:null}}
static getDerivedStateFromError(e){return{err:e}}
componentDidCatch(e,info){console.error("React error:",e,info)}
render(){if(this.state.err)return React.createElement("div",{style:{padding:40,fontFamily:"monospace",fontSize:14,color:"#EF4444",background:"#1E293B",minHeight:"100vh",whiteSpace:"pre-wrap"}},
"Error: "+this.state.err.toString()+"\n\n"+(this.state.err.stack||""));return this.props.children}
}
const[user,setUser]=useState(null);const[prof,setProf]=useState(null);const[ld,setLd]=useState(true);
useEffect(()=>{const un=auth.onAuthStateChanged(async u=>{if(u){setUser(u);try{const d=await db.collection("users").doc(u.uid).get();if(d.exists)setProf(d.data());else{const un2=db.collection("users").doc(u.uid).onSnapshot(s=>{if(s.exists){setProf(s.data());un2()}})}}catch(e){console.error(e)}}else{setUser(null);setProf(null)}setLd(false)});return()=>un()},[]);
if(ld)return<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",fontFamily:"'Inter',sans-serif"}}><div style={{fontSize:18,fontWeight:700,color:"#64748B"}}>Loading...</div></div>;
if(!user)return<LoginScreen/>;
if(!prof)return<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",fontFamily:"'Inter',sans-serif"}}><div style={{fontSize:14,color:"#64748B"}}>Setting up...</div></div>;
return<EB><Tracker cu={user} up={prof}/></EB>;
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
